<!DOCTYPE html>
<html>
<head>
    <title>Ders Programı</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    color: white;
}

.container {
    max-width: 400px;
    margin: auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    margin-top: 30px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    width: 95%;
    background-color: #667eea;
    color: white;
    border: none;
    margin-top: 5px;
    border-radius: 10px;
    font-weight: bold;
}

button:hover {
    background-color: #5a67d8;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

th {
    background-color: #667eea;
    color: white;
}

th, td {
    padding: 8px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<div class="container">
    <h2>📅 Ders Programı</h2>

    <select id="gun">
        <option>Pazartesi</option>
        <option>Salı</option>
        <option>Çarşamba</option>
        <option>Perşembe</option>
        <option>Cuma</option>
    </select>

    <input id="saat" placeholder="Saat">
    <input id="ders" placeholder="Ders">

    <button onclick="ekle()">➕ Ders Ekle</button>

    <table>
        <tr>
            <th>Gün</th>
            <th>Saat</th>
            <th>Ders</th>
        </tr>
    </table>
</div>

<script>
var program = [];

function ekle() {
    var gun = document.getElementById("gun").value;
    var saat = document.getElementById("saat").value;
    var ders = document.getElementById("ders").value;

    var tablo = document.querySelector("table");
    var satir = tablo.insertRow();

    satir.insertCell(0).innerText = gun;
    satir.insertCell(1).innerText = saat;
    satir.insertCell(2).innerText = ders;
}
</script>

</body>
</html>
