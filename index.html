<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ders Programı</title>

<link rel="manifest" href="manifest.json">

<style>

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color:white;
}

/* ANA KART */
.container {
  max-width:480px;
  margin:60px auto;
  padding:30px;
  border-radius:25px;
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 40px rgba(0,0,0,0.6),
    0 0 20px rgba(250,204,21,0.1);
}

/* BAŞLIK */
h1 {
  text-align:center;
  color:#facc15;
  font-size:28px;
  margin-bottom:25px;
}

/* INPUT */
select, input {
  width:100%;
  padding:14px;
  margin-top:8px;
  margin-bottom:18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  background:#020617;
  color:white;
}

/* BUTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  margin-top:10px;
  cursor:pointer;
}

/* ANA BUTON */
.main-btn {
  background: linear-gradient(45deg,#facc15,#f59e0b);
  color:black;
}

/* DİĞER */
.secondary {
  background:#020617;
  color:#facc15;
  border:1px solid rgba(250,204,21,0.3);
}

/* CARD */
.card {
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  border-left:4px solid #facc15;
}

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Beykent</option>
</select>

<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input type="text" id="ders" placeholder="Ders">
<input type="text" id="ogretmen" placeholder="Öğretmen">

<button class="main-btn" onclick="dersKaydet()">Dersi Kaydet</button>

<button class="secondary" onclick="haftalikGetir()">Haftalık Program</button>
<button class="secondary" onclick="gunGetir()">Seçilen Gün</button>
<button class="secondary" onclick="programSil()">Programı Temizle</button>

<div id="liste"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 DERS EKLE (ÇAKIŞMA KONTROL)
window.dersKaydet = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;
  const ders = document.getElementById("ders").value;
  const ogretmen = document.getElementById("ogretmen").value;

  const snap = await getDocs(collection(db,"dersler"));

  let cakisma=false;

  snap.forEach(doc=>{
    const d = doc.data();

    // SINIF ÇAKIŞMA
    if(
      d.kampus===kampus &&
      d.sinif===sinif &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;

    // ÖĞRETMEN ÇAKIŞMA
    if(
      d.ogretmen===ogretmen &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;
  });

  if(cakisma){
    alert("❌ Çakışma var!");
    return;
  }

  await addDoc(collection(db,"dersler"),{
    kampus,sinif,gun,saat,ders,ogretmen
  });

  alert("Kaydedildi");
}

// 📊 HAFTALIK
window.haftalikGetir = async function(){

  const snap = await getDocs(collection(db,"dersler"));

  let html="";

  snap.forEach(doc=>{
    const d = doc.data();

    html+=`
    <div class="card">
      <b>${d.gun}</b> ${d.saat}<br>
      📘 ${d.ders}<br>
      👨‍🏫 ${d.ogretmen}
    </div>`;
  });

  document.getElementById("liste").innerHTML=html;
}

// 📅 GÜN
window.gunGetir = async function(){

  const gun = document.getElementById("gun").value;
  const snap = await getDocs(collection(db,"dersler"));

  let html="";

  snap.forEach(doc=>{
    const d = doc.data();

    if(d.gun===gun){
      html+=`
      <div class="card">
        ${d.saat} → ${d.ders}<br>
        👨‍🏫 ${d.ogretmen}
      </div>`;
    }
  });

  document.getElementById("liste").innerHTML=html;
}

// 🗑 TEMİZLE
window.programSil = async function(){

  const snap = await getDocs(collection(db,"dersler"));

  for(let d of snap.docs){
    await deleteDoc(doc(db,"dersler",d.id));
  }

  alert("Silindi");
}

</script>

<!-- PWA -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
