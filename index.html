<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Okul Sistemi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

h1{
text-align:center;
color:#facc15;
margin:20px;
}

.box{
max-width:400px;
margin:50px auto;
background:#0f172a;
padding:20px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#facc15;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none}
</style>
</head>

<body>

<h1>🏫 Okul Sistemi</h1>

<div class="box" id="loginBox">
<h3>🔐 Giriş</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="giris()">Giriş Yap</button>
<button onclick="kayit()">Kayıt Ol</button>

</div>

<div class="box hidden" id="panel">
<h3 id="panelText"></h3>
<button onclick="cikis()">Çıkış Yap</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 SENİN FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// KAYIT
window.kayit = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Kayıt başarılı 🔥");
  }catch(e){
    alert("Hata: " + e.message);
  }
}

// GİRİŞ
window.giris = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, email.value, password.value);
  }catch(e){
    alert("Giriş hatası: " + e.message);
  }
}

// ÇIKIŞ
window.cikis = ()=>{
  signOut(auth);
}

// OTURUM TAKİP
onAuthStateChanged(auth,(user)=>{

  if(user){
    loginBox.style.display="none";
    panel.classList.remove("hidden");

    // ROL AYIRMA
    if(user.email === "admin@gmail.com"){
      panelText.innerText="👑 Admin Paneline Hoşgeldin";
    }
    else if(user.email.includes("ogretmen")){
      panelText.innerText="👨‍🏫 Öğretmen Paneli";
    }
    else{
      panelText.innerText="👨‍🎓 Öğrenci Paneli";
    }

  }else{
    loginBox.style.display="block";
    panel.classList.add("hidden");
  }

});

</script>

</body>
</html>
