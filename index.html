<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Programı</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2d8cf0;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
}

th {
    background: #2d8cf0;
    color: white;
}

.sil-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
    <h2>Ders Programı</h2>

    <!-- FİLTRE -->
    <select id="filtre" onchange="tabloyuGuncelle()">
        <option value="Tümü">Tümü</option>
        <option>Pazartesi</option>
        <option>Salı</option>
        <option>Çarşamba</option>
        <option>Perşembe</option>
        <option>Cuma</option>
    </select>

    <!-- GÜN -->
    <select id="gun">
        <option>Pazartesi</option>
        <option>Salı</option>
        <option>Çarşamba</option>
        <option>Perşembe</option>
        <option>Cuma</option>
    </select>

    <input id="saat" placeholder="Saat">
    <input id="ders" placeholder="Ders">
    <input id="ogretmen" placeholder="Öğretmen">
    <input id="sinif" placeholder="Sınıf">
    <input id="kampus" placeholder="Kampüs">

    <button onclick="ekle()">Ekle</button>

    <table>
        <thead>
            <tr>
                <th>Gün</th>
                <th>Saat</th>
                <th>Ders</th>
                <th>Öğretmen</th>
                <th>Sınıf</th>
                <th>Kampüs</th>
                <th>Sil</th>
            </tr>
        </thead>
        <tbody id="tablo"></tbody>
    </table>
</div>

<script>

// 📌 LOCAL STORAGE'DAN YÜKLE
let dersler = JSON.parse(localStorage.getItem("dersler")) || [];

// 📌 SAYFA AÇILINCA
window.onload = function () {
    tabloyuGuncelle();
};

// 📌 EKLE
function ekle() {
    const gun = document.getElementById("gun").value;
    const saat = document.getElementById("saat").value;
    const ders = document.getElementById("ders").value;
    const ogretmen = document.getElementById("ogretmen").value;
    const sinif = document.getElementById("sinif").value;
    const kampus = document.getElementById("kampus").value;

    if (!saat || !ders) {
        alert("Saat ve ders boş olamaz!");
        return;
    }

    const yeniDers = { gun, saat, ders, ogretmen, sinif, kampus };

    dersler.push(yeniDers);

    // 🔥 KAYDET
    localStorage.setItem("dersler", JSON.stringify(dersler));

    tabloyuGuncelle();

    // input temizle
    document.getElementById("saat").value = "";
    document.getElementById("ders").value = "";
    document.getElementById("ogretmen").value = "";
    document.getElementById("sinif").value = "";
    document.getElementById("kampus").value = "";
}

// 📌 TABLO + FİLTRE
function tabloyuGuncelle() {
    const tablo = document.getElementById("tablo");
    const filtre = document.getElementById("filtre").value;

    tablo.innerHTML = "";

    dersler.forEach((d, index) => {

        if (filtre !== "Tümü" && d.gun !== filtre) return;

        tablo.innerHTML += `
            <tr>
                <td>${d.gun}</td>
                <td>${d.saat}</td>
                <td>${d.ders}</td>
                <td>${d.ogretmen}</td>
                <td>${d.sinif}</td>
                <td>${d.kampus}</td>
                <td>
                    <button class="sil-btn" onclick="sil(${index})">Sil</button>
                </td>
            </tr>
        `;
    });
}

// 📌 SİL
function sil(index) {
    dersler.splice(index, 1);

    // 🔥 TEKRAR KAYDET
    localStorage.setItem("dersler", JSON.stringify(dersler));

    tabloyuGuncelle();
}

</script>

</body>
</html>
