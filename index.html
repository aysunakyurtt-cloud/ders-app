<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Programı Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  color:#facc15;
  margin:20px;
}

/* GRID */
.program{
  display:grid;
  grid-template-columns: 80px repeat(6, 1fr);
  gap:10px;
  padding:20px;
}

/* SAATLER */
.saat{
  text-align:center;
  color:#94a3b8;
}

/* GÜN */
.gun{
  text-align:right;
  padding-right:10px;
  color:#facc15;
}

/* DERS BLOK */
.ders{
  background:#facc15;
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  font-size:13px;
  box-shadow:0 0 10px rgba(250,204,21,0.4);
}

/* GRID CELL */
.hucre{
  min-height:60px;
  background:#0f172a;
  border-radius:8px;
  position:relative;
}

/* FORM */
.form{
  max-width:600px;
  margin:20px auto;
  background:#0f172a;
  padding:20px;
  border-radius:10px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#facc15;
  font-weight:bold;
}
</style>

</head>
<body>

<h1>📅 Ders Programı</h1>

<div class="form">
<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input id="saat" type="time">
<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">

<button onclick="ekle()">Dersi Kaydet</button>
<button onclick="ciz()">Programı Göster</button>
</div>

<div id="program"></div>

<script>

let programData = [];

function ekle(){
  programData.push({
    gun: gun.value,
    saat: saat.value,
    ders: ders.value,
    ogretmen: ogretmen.value
  });

  alert("Eklendi");
}

function ciz(){

  const gunler=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
  const saatler=["09:00","10:00","11:00","12:00","13:00","14:00"];

  let html = `<div class="program">`;

  // ÜST SAATLER
  html += `<div></div>`;
  saatler.forEach(s=>{
    html += `<div class="saat">${s}</div>`;
  });

  // GÜNLER
  gunler.forEach(gun=>{
    html += `<div class="gun">${gun}</div>`;

    saatler.forEach(saat=>{
      let ders = programData.find(p => p.gun===gun && p.saat===saat);

      if(ders){
        html += `
        <div class="hucre">
          <div class="ders">
            ${ders.ders}<br>
            <small>${ders.ogretmen}</small>
          </div>
        </div>`;
      }else{
        html += `<div class="hucre"></div>`;
      }
    });
  });

  html += `</div>`;

  document.getElementById("program").innerHTML = html;
}

</script>

</body>
</html>
