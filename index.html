<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color:white;
}

.container {
  max-width:950px;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  background: rgba(30,41,59,0.9);
}

h1 {
  text-align:center;
  color:#facc15;
}

/* INPUT */
input,select,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
}

.hidden { display:none; }

/* TABLO */
table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td {
  border:1px solid #334155;
  padding:12px;
  text-align:center;
}

th {
  background:#020617;
  color:#facc15;
}

td {
  font-weight:bold;
  color:white;
}

/* RENKLER */
.matematik { background:#2563eb; }
.turkce { background:#dc2626; }
.fen { background:#16a34a; }
.ingilizce { background:#9333ea; }
.diger { background:#475569; }

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="Kullanıcı adı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş Yap</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Beykent</option>
</select>

<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input id="ders" placeholder="Ders (Matematik vb)">
<input id="ogretmen" placeholder="Öğretmen">

<button onclick="dersKaydet()">Dersi Kaydet</button>

</div>

<button onclick="tabloGetir()">📊 Haftalık Tablo</button>

<div id="tablo"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.giris = function(){
  if(user.value==="admin" && pass.value==="1234"){
    loginBox.style.display="none";
    panel.classList.remove("hidden");
  } else alert("Hatalı giriş");
}

// SAAT YUVARLAMA
function saatDuzenle(saat){

  const saatMap = {
    "08":"09:00",
    "09":"09:00",
    "10":"10:00",
    "11":"11:00",
    "12":"12:00",
    "13":"13:00",
    "14":"14:00"
  };

  const s = saat.split(":")[0];
  return saatMap[s] || "09:00";
}

// KAYDET
window.dersKaydet = async function(){

  let saat = document.getElementById("saat").value;
  saat = saatDuzenle(saat);

  const data = {
    kampus: kampus.value,
    sinif: sinif.value,
    gun: gun.value,
    saat: saat,
    ders: ders.value,
    ogretmen: ogretmen.value
  };

  const snap = await getDocs(collection(db,"dersler"));

  let cakisma=false;

  snap.forEach(doc=>{
    const d = doc.data();

    if(
      d.kampus===data.kampus &&
      d.sinif===data.sinif &&
      d.gun===data.gun &&
      d.saat===data.saat
    ) cakisma=true;

    if(
      d.ogretmen===data.ogretmen &&
      d.gun===data.gun &&
      d.saat===data.saat
    ) cakisma=true;
  });

  if(cakisma){
    alert("❌ Çakışma var!");
    return;
  }

  await addDoc(collection(db,"dersler"),data);

  alert("✅ Kaydedildi");
}

// RENK
function renkGetir(ders){
  ders = ders.toLowerCase();

  if(ders.includes("mat")) return "matematik";
  if(ders.includes("türk")) return "turkce";
  if(ders.includes("fen")) return "fen";
  if(ders.includes("ing")) return "ingilizce";

  return "diger";
}

// TABLO
window.tabloGetir = async function(){

  const seciliKampus = kampus.value;
  const seciliSinif = sinif.value;

  const snap = await getDocs(collection(db,"dersler"));

  const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
  const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00"];

  let veri = {};

  snap.forEach(doc=>{
    const d = doc.data();

    if(d.kampus !== seciliKampus) return;
    if(d.sinif !== seciliSinif) return;

    if(!veri[d.saat]) veri[d.saat] = {};

    veri[d.saat][d.gun] = {
      ders:d.ders,
      ogretmen:d.ogretmen
    };
  });

  let html = "<table><tr><th>Saat</th>";

  gunler.forEach(g=> html+="<th>"+g+"</th>");
  html+="</tr>";

  saatler.forEach(s=>{
    html+="<tr><td>"+s+"</td>";

    gunler.forEach(g=>{
      const cell = veri[s]?.[g];

      if(cell){
        const renk = renkGetir(cell.ders);

        html+=`
        <td class="${renk}">
          ${cell.ders}<br>
          <small>${cell.ogretmen}</small>
        </td>`;
      } else {
        html+="<td>-</td>";
      }
    });

    html+="</tr>";
  });

  html+="</table>";

  tablo.innerHTML = html;
}

</script>

</body>
</html>
