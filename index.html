<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
}

h1 {
    text-align: center;
    color: #ffd700;
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
}

button {
    background: #ffd700;
    color: black;
    font-weight: bold;
}

.card {
    background: #222;
    padding: 12px;
    border-radius: 12px;
    margin-top: 8px;
    border-left: 4px solid #ffd700;
}

.dayTitle {
    margin-top: 15px;
    color: #ffd700;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus"></select>
<select id="sinif"></select>

<input type="date" id="tarih">

<button onclick="filtrele()">Tarihe Göre Filtrele</button>

<div id="liste"></div>

</div>

<script>

const programlar = [

{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"09:00", ders:"Matematik"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"10:00", ders:"Türkçe"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Çarşamba", saat:"11:00", ders:"Fen"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Perşembe", saat:"12:00", ders:"İngilizce"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Cuma", saat:"13:00", ders:"Sosyal"},

{kampus:"Başakşehir", sinif:"6A", gun:"Pazartesi", saat:"09:00", ders:"Fizik"},
{kampus:"Başakşehir", sinif:"6A", gun:"Salı", saat:"10:00", ders:"Kimya"},
{kampus:"Başakşehir", sinif:"6A", gun:"Çarşamba", saat:"11:00", ders:"Biyoloji"},
{kampus:"Başakşehir", sinif:"6A", gun:"Perşembe", saat:"12:00", ders:"Matematik"},
{kampus:"Başakşehir", sinif:"6A", gun:"Cuma", saat:"13:00", ders:"Türkçe"}

];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

// Kampüsleri doldur
function kampusleriDoldur(){
    const list = [...new Set(programlar.map(p=>p.kampus))];
    kampus.innerHTML = "<option>Kampüs Seç</option>";
    list.forEach(k=>{
        kampus.innerHTML += `<option>${k}</option>`;
    });
}

// Sınıfları doldur
function siniflariDoldur(){
    const list = [...new Set(programlar
        .filter(p=>p.kampus===kampus.value)
        .map(p=>p.sinif))];

    sinif.innerHTML = "<option>Sınıf Seç</option>";
    list.forEach(s=>{
        sinif.innerHTML += `<option>${s}</option>`;
    });
}

// 📅 TÜM HAFTA GÖSTER
function haftalikGoster(){

    let liste = document.getElementById("liste");
    liste.innerHTML = "";

    gunler.forEach(gun=>{

        const dersler = programlar.filter(p =>
            p.kampus===kampus.value &&
            p.sinif===sinif.value &&
            p.gun===gun
        );

        if(dersler.length > 0){
            liste.innerHTML += `<div class="dayTitle">${gun}</div>`;

            dersler.forEach(d=>{
                liste.innerHTML += `
                <div class="card">
                    ${d.saat} - ${d.ders}
                </div>`;
            });
        }
    });
}

// 📅 TARİH → GÜN
function gunBul(tarih){
    const g = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    return g[new Date(tarih).getDay()];
}

// 🎯 FİLTRE
function filtrele(){

    let tarih = document.getElementById("tarih").value;
    if(!tarih) return;

    let gun = gunBul(tarih);

    let liste = document.getElementById("liste");
    liste.innerHTML = `<div class="dayTitle">${gun}</div>`;

    const dersler = programlar.filter(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun
    );

    if(dersler.length === 0){
        liste.innerHTML += "Ders yok";
        return;
    }

    dersler.forEach(d=>{
        liste.innerHTML += `
        <div class="card">
            ${d.saat} - ${d.ders}
        </div>`;
    });
}

// EVENTS
kampus.onchange = ()=>{
    siniflariDoldur();
    liste.innerHTML="";
};

sinif.onchange = haftalikGoster;

// BAŞLAT
kampusleriDoldur();

</script>

</body>
</html>
