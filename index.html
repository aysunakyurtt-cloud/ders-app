<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Programı</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

input, select {
    width: 90%;
    padding: 12px;
    margin: 6px;
    border-radius: 8px;
}

button {
    width: 95%;
    padding: 12px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 8px;
}

table {
    width: 100%;
    margin-top: 20px;
}

th {
    background: #2196F3;
    color: white;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

.edit-btn { background: orange; }
.delete-btn { background: red; }
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<!-- FİLTRE -->
<select onchange="filtrele(this.value)">
    <option value="hepsi">Tümü</option>
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
</select>

<select id="gun">
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
</select>

<input id="saat" placeholder="Saat">
<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">
<input id="sinif" placeholder="Sınıf">
<input id="kampus" placeholder="Kampüs">

<button onclick="ekle()">Ekle / Güncelle</button>

<table id="tablo">
<tr>
<th>Gün</th>
<th>Saat</th>
<th>Ders</th>
<th>Öğretmen</th>
<th>Sınıf</th>
<th>Kampüs</th>
<th>İşlem</th>
</tr>
</table>

</div>

<script>
let program = JSON.parse(localStorage.getItem("program")) || [];
let editIndex = -1;
let aktifFiltre = "hepsi";

window.onload = tabloYenile;

function ekle() {
    let veri = {
        gun: gun.value,
        saat: saat.value,
        ders: ders.value,
        ogretmen: ogretmen.value,
        sinif: sinif.value,
        kampus: kampus.value
    };

    if(!veri.saat || !veri.ders) return alert("Boş bırakma!");

    if(editIndex === -1) {
        program.push(veri);
    } else {
        program[editIndex] = veri;
        editIndex = -1;
    }

    localStorage.setItem("program", JSON.stringify(program));
    temizle();
    tabloYenile();
}

function satirEkle(veri, index) {

    if(aktifFiltre !== "hepsi" && veri.gun !== aktifFiltre) return;

    let tr = tablo.insertRow();

    tr.insertCell(0).innerText = veri.gun;
    tr.insertCell(1).innerText = veri.saat;
    tr.insertCell(2).innerText = veri.ders;
    tr.insertCell(3).innerText = veri.ogretmen;
    tr.insertCell(4).innerText = veri.sinif;
    tr.insertCell(5).innerText = veri.kampus;

    let td = tr.insertCell(6);

    let edit = document.createElement("button");
    edit.innerText = "Edit";
    edit.className = "edit-btn";
    edit.onclick = () => {
        gun.value = veri.gun;
        saat.value = veri.saat;
        ders.value = veri.ders;
        ogretmen.value = veri.ogretmen;
        sinif.value = veri.sinif;
        kampus.value = veri.kampus;
        editIndex = index;
    };

    let sil = document.createElement("button");
    sil.innerText = "Sil";
    sil.className = "delete-btn";
    sil.onclick = () => {
        program.splice(index,1);
        localStorage.setItem("program", JSON.stringify(program));
        tabloYenile();
    };

    td.appendChild(edit);
    td.appendChild(sil);
}

function tabloYenile() {
    tablo.innerHTML = `
    <tr>
    <th>Gün</th>
    <th>Saat</th>
    <th>Ders</th>
    <th>Öğretmen</th>
    <th>Sınıf</th>
    <th>Kampüs</th>
    <th>İşlem</th>
    </tr>
    `;

    program.forEach((v,i)=>satirEkle(v,i));
}

function filtrele(gunSecim) {
    aktifFiltre = gunSecim;
    tabloYenile();
}

function temizle() {
    saat.value="";
    ders.value="";
    ogretmen.value="";
    sinif.value="";
    kampus.value="";
}
</script>

</body>
</html>
