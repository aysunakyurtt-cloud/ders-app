<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Programı</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3498db">

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #9face6);
  text-align: center;
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3498db;
  color: white;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th {
  background: #3498db;
  color: white;
  padding: 8px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.sil { background: red; }
.edit { background: orange; }
</style>
</head>

<body>

<div class="container">
<h1>Ders Programı</h1>

<select id="filterGun" onchange="listele()">
<option>Tümü</option>
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input id="saat" placeholder="Saat">
<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">
<input id="sinif" placeholder="Sınıf">
<input id="kampus" placeholder="Kampüs">

<button onclick="ekleGuncelle()" id="btn">Ekle</button>

<table>
<thead>
<tr>
<th>Gün</th>
<th>Saat</th>
<th>Ders</th>
<th>Öğretmen</th>
<th>Sınıf</th>
<th>Kampüs</th>
<th>İşlem</th>
</tr>
</thead>
<tbody id="liste"></tbody>
</table>
</div>

<script>
let dersler = JSON.parse(localStorage.getItem("dersler")) || [];
let editIndex = -1;

function kaydet() {
  localStorage.setItem("dersler", JSON.stringify(dersler));
}

function ekleGuncelle() {
  let veri = {
    gun: gun.value,
    saat: saat.value,
    ders: ders.value,
    ogretmen: ogretmen.value,
    sinif: sinif.value,
    kampus: kampus.value
  };

  if(editIndex === -1) {
    dersler.push(veri);
  } else {
    dersler[editIndex] = veri;
    editIndex = -1;
    btn.innerText = "Ekle";
  }

  kaydet();
  temizle();
  listele();
}

function listele() {
  dersler.sort((a,b)=>a.saat.localeCompare(b.saat));

  let secili = filterGun.value;
  let html = "";

  dersler.forEach((d,i)=>{
    if(secili==="Tümü" || d.gun===secili){
      html += `
      <tr>
        <td>${d.gun}</td>
        <td>${d.saat}</td>
        <td>${d.ders}</td>
        <td>${d.ogretmen}</td>
        <td>${d.sinif}</td>
        <td>${d.kampus}</td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="sil" onclick="sil(${i})">Sil</button>
        </td>
      </tr>`;
    }
  });

  liste.innerHTML = html;
}

function sil(i){
  dersler.splice(i,1);
  kaydet();
  listele();
}

function edit(i){
  let d = dersler[i];

  gun.value = d.gun;
  saat.value = d.saat;
  ders.value = d.ders;
  ogretmen.value = d.ogretmen;
  sinif.value = d.sinif;
  kampus.value = d.kampus;

  editIndex = i;
  btn.innerText = "Güncelle";
}

function temizle(){
  saat.value="";
  ders.value="";
  ogretmen.value="";
  sinif.value="";
  kampus.value="";
}

listele();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
