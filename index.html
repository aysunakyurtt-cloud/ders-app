<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ders Programı</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.container {
  max-width:500px;
  margin:40px auto;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1 {
  text-align:center;
  color:#facc15;
}

select,input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

select,input {
  background:#0f172a;
  color:white;
}

button {
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

.card {
  background:#0f172a;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ders Programı</h1>

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Beykent</option>
</select>

<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input type="text" id="ders" placeholder="Ders">

<button onclick="dersKaydet()">Dersi Kaydet</button>
<button onclick="haftalikGetir()">Haftalık Program</button>
<button onclick="gunGetir()">Seçilen Gün</button>
<button onclick="otomatikProgram()">🤖 Otomatik Program</button>
<button onclick="programSil()">🗑 Programı Temizle</button>

<div id="liste"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
  storageBucket: "ders-programi-d79e0.appspot.com",
  messagingSenderId: "265838203871",
  appId: "1:265838203871:web:6f1ea40d87f90edeeaea6a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//////////////////////////////////////
// 📌 DERS KAYDET + ÇAKIŞMA ENGEL
//////////////////////////////////////
window.dersKaydet = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;
  const ders = document.getElementById("ders").value;

  if(!saat || !ders){
    alert("Boş bırakma!");
    return;
  }

  const q = query(collection(db,"dersler"),
    where("kampus","==",kampus),
    where("sinif","==",sinif),
    where("gun","==",gun),
    where("saat","==",saat)
  );

  const snap = await getDocs(q);

  if(!snap.empty){
    alert("❌ Bu saatte ders var!");
    return;
  }

  await addDoc(collection(db,"dersler"),{
    kampus,sinif,gun,saat,ders
  });

  alert("✅ Kaydedildi");
}

//////////////////////////////////////
// 📌 HAFTALIK PROGRAM
//////////////////////////////////////
window.haftalikGetir = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;

  const q = query(collection(db,"dersler"),
    where("kampus","==",kampus),
    where("sinif","==",sinif)
  );

  const snap = await getDocs(q);

  let html="<h3>Haftalık Program</h3>";

  snap.forEach(doc=>{
    const d = doc.data();
    html += `<div class="card">${d.gun} - ${d.saat} → ${d.ders}</div>`;
  });

  document.getElementById("liste").innerHTML = html;
}

//////////////////////////////////////
// 📌 GÜNE GÖRE
//////////////////////////////////////
window.gunGetir = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;
  const gun = document.getElementById("gun").value;

  const q = query(collection(db,"dersler"),
    where("kampus","==",kampus),
    where("sinif","==",sinif),
    where("gun","==",gun)
  );

  const snap = await getDocs(q);

  let html = `<h3>${gun}</h3>`;

  snap.forEach(doc=>{
    const d = doc.data();
    html += `<div class="card">${d.saat} → ${d.ders}</div>`;
  });

  document.getElementById("liste").innerHTML = html;
}

//////////////////////////////////////
// 🤖 OTOMATİK PROGRAM
//////////////////////////////////////
const dersDagilimi = {
  "1":[
    {ad:"Matematik",saat:5},
    {ad:"Türkçe",saat:5},
    {ad:"Fen",saat:3}
  ],
  "2":[
    {ad:"Matematik",saat:4},
    {ad:"İngilizce",saat:3},
    {ad:"Hayat Bilgisi",saat:3}
  ]
};

window.otomatikProgram = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;

  const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
  const saatler = ["09:00","10:00","11:00","12:00","13:00"];

  let dersler=[];

  dersDagilimi[sinif].forEach(d=>{
    for(let i=0;i<d.saat;i++){
      dersler.push(d.ad);
    }
  });

  dersler.sort(()=>Math.random()-0.5);

  let i=0;

  for(let g of gunler){
    for(let s of saatler){

      if(i>=dersler.length) break;

      await addDoc(collection(db,"dersler"),{
        kampus,
        sinif,
        gun:g,
        saat:s,
        ders:dersler[i]
      });

      i++;
    }
  }

  alert("🤖 Otomatik program oluşturuldu!");
}

//////////////////////////////////////
// 🗑 PROGRAM SİL
//////////////////////////////////////
window.programSil = async function(){

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;

  const q = query(collection(db,"dersler"),
    where("kampus","==",kampus),
    where("sinif","==",sinif)
  );

  const snap = await getDocs(q);

  for (let d of snap.docs) {
    await deleteDoc(doc(db,"dersler", d.id));
  }

  alert("🗑 Program silindi!");
}

</script>

</body>
</html>
