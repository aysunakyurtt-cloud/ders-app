<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color: white;
}

.container {
  max-width: 600px;
  margin: 20px auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 20px;
}

h1 {
  text-align: center;
  color: #FFD700;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #FFD700;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #2a2a2a;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.day {
  color: #FFD700;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ders Programı</h1>

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Başakşehir</option>
<option>Pendik</option>
<option>Florya</option>
</select>

<select id="sinif">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input type="text" id="ders" placeholder="Ders">

<button onclick="ekle()">Dersi Kaydet</button>

<hr>

<button onclick="getir()">Programı Getir</button>

<div id="liste"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 SENİN CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
  storageBucket: "ders-programi-d79e0.appspot.com",
  messagingSenderId: "265838203871",
  appId: "1:265838203871:web:6f1ea40d87f90edeeaea6a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.ekle = async function() {

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;
  const ders = document.getElementById("ders").value;

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let cakisma = false;

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    if (
      d.kampus === kampus &&
      d.sinif === sinif &&
      d.gun === gun &&
      d.saat === saat
    ) {
      cakisma = true;
    }
  });

  if (cakisma) {
    alert("❌ Bu saatte zaten ders var!");
    return;
  }

  await addDoc(collection(db, "dersler"), {
    kampus,
    sinif,
    gun,
    saat,
    ders
  });

  alert("✅ Ders eklendi!");
}

window.getir = async function() {

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let data = {};

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    if(!data[d.gun]) data[d.gun] = [];

    data[d.gun].push(d);
  });

  for (let gun in data) {

    liste.innerHTML += `<div class="day">${gun}</div>`;

    data[gun].sort((a,b)=>a.saat.localeCompare(b.saat));

    data[gun].forEach(d => {
      liste.innerHTML += `
      <div class="card">
        ${d.saat} - ${d.ders} (Sınıf ${d.sinif} / ${d.kampus})
      </div>`;
    });
  }
}

</script>

</body>
</html>
