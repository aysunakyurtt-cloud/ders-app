<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255,215,0,0.1);
}

h1 {
  text-align: center;
  color: #FFD700;
  margin-bottom: 25px;
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
  font-size: 15px;
}

input:focus, select:focus {
  outline: none;
  box-shadow: 0 0 10px #FFD700;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary {
  background: linear-gradient(45deg,#FFD700,#ffae00);
  color: black;
}

.btn-secondary {
  background: #334155;
  color: white;
}

.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
  border-left: 5px solid #FFD700;
}

.day {
  margin-top: 20px;
  font-weight: bold;
  color: #FFD700;
}
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<label>Kampüs</label>
<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Başakşehir</option>
<option>Pendik</option>
<option>Florya</option>
</select>

<label>Sınıf</label>
<select id="sinif">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>Gün</label>
<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<label>Saat</label>
<input type="time" id="saat">

<label>Ders</label>
<input type="text" id="ders" placeholder="Örn: Matematik">

<button class="btn-primary" onclick="ekle()">Dersi Kaydet</button>

<button class="btn-secondary" onclick="getir()">Programı Getir</button>

<div id="liste"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
  storageBucket: "ders-programi-d79e0.appspot.com",
  messagingSenderId: "265838203871",
  appId: "1:265838203871:web:6f1ea40d87f90edeeaea6a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.ekle = async function() {

  const kampus = document.getElementById("kampus").value;
  const sinif = document.getElementById("sinif").value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;
  const ders = document.getElementById("ders").value;
  const ogretmen = prompt("Öğretmen adı gir:");

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let sinifCakisma = false;
  let ogretmenCakisma = false;

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    if (
      d.kampus === kampus &&
      d.sinif === sinif &&
      d.gun === gun &&
      d.saat === saat
    ) {
      sinifCakisma = true;
    }

    if (
      d.ogretmen === ogretmen &&
      d.gun === gun &&
      d.saat === saat
    ) {
      ogretmenCakisma = true;
    }
  });

  if (sinifCakisma) {
    alert("❌ Bu sınıfta ders var!");
    return;
  }

  if (ogretmenCakisma) {
    alert("❌ Öğretmen dolu!");
    return;
  }

  await addDoc(collection(db, "dersler"), {
    kampus, sinif, gun, saat, ders, ogretmen
  });

  alert("✅ Kaydedildi");
}

window.getir = async function() {

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let data = {};

  querySnapshot.forEach((doc) => {
    const d = doc.data();
    if(!data[d.gun]) data[d.gun] = [];
    data[d.gun].push(d);
  });

  for (let gun in data) {

    liste.innerHTML += `<div class="day">${gun}</div>`;

    data[gun].sort((a,b)=>a.saat.localeCompare(b.saat));

    data[gun].forEach(d => {
      liste.innerHTML += `
      <div class="card">
        <b>${d.saat}</b> - ${d.ders} <br>
        👨‍🏫 ${d.ogretmen} <br>
        🏫 ${d.kampus} | Sınıf ${d.sinif}
      </div>`;
    });
  }
}

</script>

</body>
</html>
