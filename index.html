<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ana Sayfa</title>

<style>
body{
  background:#0b1a2b;
  color:white;
  text-align:center;
  margin-top:100px;
}
button{
  padding:10px 20px;
  background:gold;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>🎉 Giriş Başarılı</h1>

<button onclick="logout()">Çıkış Yap</button>

<script type="module">
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth();

window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="index.html";
  });
}
</script>

</body>
</html>
