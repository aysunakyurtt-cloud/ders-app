<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ders Programı</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3498db">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to right, #74ebd5, #9face6);
}

.container {
  max-width: 400px;
  margin: 40px auto;
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #3498db;
  color: white;
  border: none;
  font-weight: bold;
}

.kart {
  background: #f9f9f9;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  text-align: left;
}

.kart p {
  margin: 5px 0;
}

.editBtn {
  background: orange;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  margin-right: 5px;
}

.deleteBtn {
  background: red;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
}

/* MOBİL */
@media (max-width: 600px) {
  .container {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Ders Programı</h2>

  <select id="gun">
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
  </select>

  <input type="time" id="saat">
  <input type="text" id="ders" placeholder="Ders">
  <input type="text" id="ogretmen" placeholder="Öğretmen">
  <input type="text" id="sinif" placeholder="Sınıf">
  <input type="text" id="kampus" placeholder="Kampüs">

  <button onclick="ekle()">Ekle / Güncelle</button>

  <div id="liste"></div>
</div>

<script>
// VERİLER
let dersler = JSON.parse(localStorage.getItem("dersler")) || [];
let editIndex = null;

// KAYDET
function kaydet() {
  localStorage.setItem("dersler", JSON.stringify(dersler));
}

// LİSTEYİ GÖSTER
function listeyiGoster() {
  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  dersler.forEach((d, i) => {
    liste.innerHTML += `
      <div class="kart">
        <p><b>Gün:</b> ${d.gun}</p>
        <p><b>Saat:</b> ${d.saat}</p>
        <p><b>Ders:</b> ${d.ders}</p>
        <p><b>Öğretmen:</b> ${d.ogretmen}</p>
        <p><b>Sınıf:</b> ${d.sinif}</p>
        <p><b>Kampüs:</b> ${d.kampus}</p>

        <button class="editBtn" onclick="duzenle(${i})">Edit</button>
        <button class="deleteBtn" onclick="sil(${i})">Sil</button>
      </div>
    `;
  });
}

// EKLE / GÜNCELLE
function ekle() {
  const veri = {
    gun: document.getElementById("gun").value,
    saat: document.getElementById("saat").value,
    ders: document.getElementById("ders").value,
    ogretmen: document.getElementById("ogretmen").value,
    sinif: document.getElementById("sinif").value,
    kampus: document.getElementById("kampus").value
  };

  if (editIndex === null) {
    dersler.push(veri);
  } else {
    dersler[editIndex] = veri;
    editIndex = null;
  }

  kaydet();
  listeyiGoster();
  temizle();
}

// SİL
function sil(i) {
  dersler.splice(i, 1);
  kaydet();
  listeyiGoster();
}

// EDİT
function duzenle(i) {
  const d = dersler[i];

  document.getElementById("gun").value = d.gun;
  document.getElementById("saat").value = d.saat;
  document.getElementById("ders").value = d.ders;
  document.getElementById("ogretmen").value = d.ogretmen;
  document.getElementById("sinif").value = d.sinif;
  document.getElementById("kampus").value = d.kampus;

  editIndex = i;
}

// TEMİZLE
function temizle() {
  document.getElementById("saat").value = "";
  document.getElementById("ders").value = "";
  document.getElementById("ogretmen").value = "";
  document.getElementById("sinif").value = "";
  document.getElementById("kampus").value = "";
}

// SERVICE WORKER (APP GİBİ)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// BAŞLAT
listeyiGoster();
</script>

</body>
</html>
