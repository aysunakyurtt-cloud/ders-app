<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 500px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
}

h1 {
    text-align: center;
    color: #ffd700;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
}

.card {
    background: #222;
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
    border-left: 4px solid #ffd700;
}
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus">
<option value="">Kampüs Seç</option>
<option>Bahçelievler</option>
<option>Başakşehir</option>
<option>Haliç</option>
</select>

<select id="sinif">
<option value="">Sınıf Seç</option>
<option>5A</option>
<option>6A</option>
</select>

<input type="date" id="tarih">

<button onclick="goster()">Programı Göster</button>

<div id="liste"></div>

</div>

<script>

// 🔥 TÜM HAFTA PROGRAM
const programlar = [

{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"09:00", ders:"Matematik"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"10:00", ders:"Türkçe"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Çarşamba", saat:"11:00", ders:"Fen"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Perşembe", saat:"12:00", ders:"İngilizce"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Cuma", saat:"13:00", ders:"Sosyal"},

{kampus:"Başakşehir", sinif:"6A", gun:"Pazartesi", saat:"09:00", ders:"Fizik"},
{kampus:"Başakşehir", sinif:"6A", gun:"Salı", saat:"10:00", ders:"Kimya"},
{kampus:"Başakşehir", sinif:"6A", gun:"Çarşamba", saat:"11:00", ders:"Biyoloji"},
{kampus:"Başakşehir", sinif:"6A", gun:"Perşembe", saat:"12:00", ders:"Matematik"},
{kampus:"Başakşehir", sinif:"6A", gun:"Cuma", saat:"13:00", ders:"Türkçe"}

];

// 📅 TARİH → GÜN ÇEVİR
function gunBul(tarih) {
    const gunler = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    const d = new Date(tarih);
    return gunler[d.getDay()];
}

// 🎯 GÖSTER
function goster(){

    let kampus = document.getElementById("kampus").value;
    let sinif = document.getElementById("sinif").value;
    let tarih = document.getElementById("tarih").value;
    let liste = document.getElementById("liste");

    if(!kampus || !sinif || !tarih){
        liste.innerHTML = "Lütfen tüm seçimleri yap";
        return;
    }

    let gun = gunBul(tarih);

    let filtre = programlar.filter(p =>
        p.kampus === kampus &&
        p.sinif === sinif &&
        p.gun === gun
    );

    liste.innerHTML = `<h3>${gun} Programı</h3>`;

    if(filtre.length === 0){
        liste.innerHTML += "Bugün ders yok";
        return;
    }

    filtre.forEach(d => {
        liste.innerHTML += `
        <div class="card">
            Saat: ${d.saat}<br>
            Ders: ${d.ders}
        </div>`;
    });
}

</script>

</body>
</html>
