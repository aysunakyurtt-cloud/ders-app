<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
}

.container {
  max-width: 95%;
  margin: 20px auto;
}

select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ddd;
  text-align: center;
  padding: 8px;
}

th {
  background: #3498db;
  color: white;
}

.tableWrap {
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

<h2>Ders Programı</h2>

<select id="kampus"></select>
<select id="sinif"></select>

<div class="tableWrap">
<table id="tablo"></table>
</div>

</div>

<script>

let programlar = [];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00"];

// 📥 JSON OKU
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    programlar = data;
    kampusleriDoldur();
  });

// Kampüs doldur
function kampusleriDoldur(){
  const list = [...new Set(programlar.map(p=>p.kampus))];
  kampus.innerHTML = "<option>Kampüs Seç</option>";

  list.forEach(k=>{
    kampus.innerHTML += `<option>${k}</option>`;
  });
}

// Sınıf doldur
function siniflariDoldur(){
  const list = [...new Set(programlar
    .filter(p=>p.kampus===kampus.value)
    .map(p=>p.sinif))];

  sinif.innerHTML = "<option>Sınıf Seç</option>";

  list.forEach(s=>{
    sinif.innerHTML += `<option>${s}</option>`;
  });
}

// TABLO
function tabloOlustur(){

  const tablo = document.getElementById("tablo");
  tablo.innerHTML = "";

  let html = "<tr><th>Saat</th>";

  gunler.forEach(g=>{
    html += `<th>${g}</th>`;
  });

  html += "</tr>";

  saatler.forEach(saat=>{
    html += `<tr><td>${saat}</td>`;

    gunler.forEach(gun=>{

      const ders = programlar.find(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun &&
        p.saat===saat
      );

      html += `<td>${ders ? ders.ders : ""}</td>`;
    });

    html += "</tr>";
  });

  tablo.innerHTML = html;
}

// Events
kampus.onchange = ()=>{
  siniflariDoldur();
  tabloOlustur();
};

sinif.onchange = tabloOlustur;

</script>

</body>
</html>
