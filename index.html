<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
}

h1 { text-align:center; color:#ffd700; }

input, select, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:none;
}

button {
    background:#ffd700;
    color:black;
    font-weight:bold;
}

.card {
    background:#222;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

.adminBtn {
    background:red;
    color:white;
    margin-top:5px;
}

.dayTitle {
    color:#ffd700;
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<!-- MOD SEÇİM -->
<select id="mod" onchange="modDegistir()">
<option value="ogrenci">Öğrenci</option>
<option value="admin">Admin</option>
</select>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<h3>Ders Ekle</h3>

<input id="kampus" placeholder="Kampüs">
<input id="sinif" placeholder="Sınıf">
<input id="gun" placeholder="Gün (Pazartesi)">
<input id="saat" placeholder="Saat (09:00)">
<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">

<button onclick="ekle()">Ekle</button>

</div>

<hr>

<!-- FİLTRE -->
<input type="date" id="tarih">
<button onclick="filtrele()">Tarihe Göre Filtrele</button>

<div id="liste"></div>

</div>

<script>

let programlar = JSON.parse(localStorage.getItem("dersler")) || [];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

// MOD DEĞİŞ
function modDegistir(){
    let mod = document.getElementById("mod").value;
    document.getElementById("adminPanel").style.display =
        mod === "admin" ? "block" : "none";
}

// EKLE
function ekle(){

    let yeni = {
        kampus: kampus.value,
        sinif: sinif.value,
        gun: gun.value,
        saat: saat.value,
        ders: ders.value,
        ogretmen: ogretmen.value
    };

    programlar.push(yeni);
    localStorage.setItem("dersler", JSON.stringify(programlar));

    alert("Eklendi!");
    haftalikGoster();
}

// SİL
function sil(index){
    programlar.splice(index,1);
    localStorage.setItem("dersler", JSON.stringify(programlar));
    haftalikGoster();
}

// HAFTALIK
function haftalikGoster(){

    liste.innerHTML = "";

    gunler.forEach(gun=>{

        let dersler = programlar.filter(p => p.gun === gun);

        if(dersler.length > 0){

            liste.innerHTML += `<div class="dayTitle">${gun}</div>`;

            dersler.forEach((d,i)=>{
                liste.innerHTML += `
                <div class="card">
                    ${d.saat} - ${d.ders} (${d.ogretmen})
                    <button class="adminBtn" onclick="sil(${i})">Sil</button>
                </div>`;
            });
        }
    });
}

// TARİH → GÜN
function gunBul(t){
    return ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"][new Date(t).getDay()];
}

// FİLTRE
function filtrele(){

    let tarih = document.getElementById("tarih").value;
    if(!tarih) return;

    let gun = gunBul(tarih);

    liste.innerHTML = `<div class="dayTitle">${gun}</div>`;

    let dersler = programlar.filter(p => p.gun === gun);

    dersler.forEach((d,i)=>{
        liste.innerHTML += `
        <div class="card">
            ${d.saat} - ${d.ders} (${d.ogretmen})
            <button class="adminBtn" onclick="sil(${i})">Sil</button>
        </div>`;
    });
}

window.onload = haftalikGoster;

</script>

</body>
</html>
