<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to right, #74ebd5, #9face6);
}

.container {
  max-width: 400px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #3498db;
  color: white;
  font-weight: bold;
}

.kart {
  background: #f2f2f2;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.editBtn { background: orange; color:white; }
.deleteBtn { background: red; color:white; }

</style>
</head>

<body>

<div class="container">
<h2>Ders Programı</h2>

<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">
<input id="sinif" placeholder="Sınıf">
<input id="kampus" placeholder="Kampüs">

<button onclick="ekle()">Ders Ekle</button>
<button onclick="otomatikOlustur()">🤖 Akıllı Program Yap</button>

<div id="liste"></div>
</div>

<script>

let dersler = JSON.parse(localStorage.getItem("dersler")) || [];
let editIndex = null;

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];

// Kaydet
function kaydet(){
  localStorage.setItem("dersler", JSON.stringify(dersler));
}

// Liste
function listeyiGoster(){
  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  dersler.forEach((d,i)=>{
    liste.innerHTML += `
    <div class="kart">
      <b>${d.ders}</b><br>
      ${d.gun || "-"} | ${d.saat || "-"}<br>
      👨‍🏫 ${d.ogretmen} | 🏫 ${d.sinif} | 📍 ${d.kampus}<br><br>

      <button class="editBtn" onclick="duzenle(${i})">Edit</button>
      <button class="deleteBtn" onclick="sil(${i})">Sil</button>
    </div>
    `;
  });
}

// EKLE
function ekle(){
  const veri = {
    ders: ders.value,
    ogretmen: ogretmen.value,
    sinif: sinif.value,
    kampus: kampus.value,
    gun: "",
    saat: ""
  };

  if(editIndex === null){
    dersler.push(veri);
  } else {
    dersler[editIndex] = veri;
    editIndex = null;
  }

  kaydet();
  listeyiGoster();
  temizle();
}

// SİL
function sil(i){
  dersler.splice(i,1);
  kaydet();
  listeyiGoster();
}

// EDİT
function duzenle(i){
  const d = dersler[i];

  ders.value = d.ders;
  ogretmen.value = d.ogretmen;
  sinif.value = d.sinif;
  kampus.value = d.kampus;

  editIndex = i;
}

// TEMİZLE
function temizle(){
  ders.value="";
  ogretmen.value="";
  sinif.value="";
  kampus.value="";
}

// ÇAKIŞMA
function uygunMu(gun,saat,ders){
  return !dersler.some(d =>
    d.gun === gun &&
    d.saat === saat &&
    (
      d.ogretmen === ders.ogretmen ||
      d.sinif === ders.sinif
    )
  );
}

// 🔥 KAMPÜS GRUPLA
function kampusGrupla(){
  const grup = {};

  dersler.forEach(d=>{
    if(!grup[d.kampus]){
      grup[d.kampus] = [];
    }
    grup[d.kampus].push(d);
  });

  return grup;
}

// 🤖 AKILLI PROGRAM
function otomatikOlustur(){

  // sıfırla
  dersler.forEach(d=>{
    d.gun="";
    d.saat="";
  });

  const gruplar = kampusGrupla();
  let gunIndex = 0;

  // her kampüs ayrı günlere dağıtılır
  for(let kampus in gruplar){

    let dersListesi = gruplar[kampus];
    let gun = gunler[gunIndex % gunler.length];
    let saatIndex = 0;

    dersListesi.forEach(ders=>{

      while(saatIndex < saatler.length){

        let saat = saatler[saatIndex];

        if(uygunMu(gun,saat,ders)){
          ders.gun = gun;
          ders.saat = saat;
          saatIndex++;
          break;
        }

        saatIndex++;
      }

    });

    gunIndex++;
  }

  kaydet();
  listeyiGoster();
}

// başlat
listeyiGoster();

</script>

</body>
</html>
