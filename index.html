<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haftalık Ders Programı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

input, select {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    width: 95%;
    padding: 12px;
    background: linear-gradient(to right, #2196f3, #21cbf3);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    opacity: 0.9;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

th {
    background: #2196f3;
    color: white;
}

.delete-btn {
    background: red;
    border: none;
    color: white;
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Haftalık Ders Programı</h1>

<select id="gun">
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
</select>

<input type="text" id="saat" placeholder="Saat (örn: 10)">
<input type="text" id="ders" placeholder="Ders adı">
<input type="text" id="ogretmen" placeholder="Öğretmen">
<input type="text" id="sinif" placeholder="Sınıf">
<input type="text" id="kampus" placeholder="Kampüs">

<button onclick="ekle()">Ekle</button>

<table>
<tr>
    <th>Gün</th>
    <th>Saat</th>
    <th>Ders</th>
    <th>Öğretmen</th>
    <th>Sınıf</th>
    <th>Kampüs</th>
    <th>Sil</th>
</tr>
</table>

</div>

<script>
function ekle() {

    var gun = document.getElementById("gun").value;
    var saat = document.getElementById("saat").value;
    var ders = document.getElementById("ders").value;
    var ogretmen = document.getElementById("ogretmen").value;
    var sinif = document.getElementById("sinif").value;
    var kampus = document.getElementById("kampus").value;

    if(saat === "" || ders === ""){
        alert("Saat ve ders boş olamaz!");
        return;
    }

    var tablo = document.querySelector("table");
    var satir = tablo.insertRow();

    satir.insertCell(0).innerText = gun;
    satir.insertCell(1).innerText = saat;
    satir.insertCell(2).innerText = ders;
    satir.insertCell(3).innerText = ogretmen;
    satir.insertCell(4).innerText = sinif;
    satir.insertCell(5).innerText = kampus;

    var silHucre = satir.insertCell(6);
    var btn = document.createElement("button");
    btn.innerText = "Sil";
    btn.className = "delete-btn";

    btn.onclick = function() {
        satir.remove();
    };

    silHucre.appendChild(btn);

    // inputları temizle
    document.getElementById("saat").value = "";
    document.getElementById("ders").value = "";
    document.getElementById("ogretmen").value = "";
    document.getElementById("sinif").value = "";
    document.getElementById("kampus").value = "";
}
</script>

</body>
</html>
