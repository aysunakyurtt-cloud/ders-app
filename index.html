<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akıllı Ders Programı</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
h1{text-align:center;color:#facc15;margin:20px;}

.form{
max-width:600px;margin:20px auto;background:#0f172a;
padding:20px;border-radius:10px;
}

input,select,button{
width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;
}

button{background:#facc15;font-weight:bold;cursor:pointer;}

.program{
display:grid;
grid-template-columns:80px repeat(6,1fr);
gap:10px;padding:20px;
}

.saat{text-align:center;color:#94a3b8;}
.gun{text-align:right;padding-right:10px;color:#facc15;}

.hucre{min-height:70px;background:#0f172a;border-radius:8px;}

.ders{
background:#facc15;color:black;padding:10px;border-radius:10px;
font-weight:bold;cursor:grab;
}
</style>
</head>

<body>

<h1>🤖 Akıllı Ders Programı</h1>

<div class="form">

<input id="ders" placeholder="Ders (Matematik)">
<input id="ogretmen" placeholder="Öğretmen (Ali Hoca)">
<input id="adet" type="number" placeholder="Haftalık saat sayısı">

<button onclick="dersEkle()">Ders Ekle</button>
<button onclick="otomatik()">🤖 Otomatik Program</button>

</div>

<div id="program"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dersler = [];
let programData = [];

const gunler=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler=["09:00","10:00","11:00","12:00","13:00","14:00"];

// DERS EKLE
window.dersEkle = async function(){
  await addDoc(collection(db,"dersler"),{
    ders: ders.value,
    ogretmen: ogretmen.value,
    adet: Number(adet.value)
  });

  alert("Ders eklendi");
}

// OTOMATİK PROGRAM
window.otomatik = async function(){

  // eski programı sil
  const eski = await getDocs(collection(db,"program"));
  eski.forEach(async d=>{
    await deleteDoc(doc(db,"program",d.id));
  });

  const dersSnap = await getDocs(collection(db,"dersler"));
  dersler = [];
  dersSnap.forEach(d=>{
    dersler.push(d.data());
  });

  let yerlesim = [];

  for(let d of dersler){

    let kalan = d.adet;

    for(let gun of gunler){
      for(let saat of saatler){

        if(kalan<=0) break;

        // SLOT DOLU MU
        let dolu = yerlesim.find(x=>x.gun===gun && x.saat===saat);

        // ÖĞRETMEN ÇAKIŞMA
        let cakisma = yerlesim.find(x=>x.ogretmen===d.ogretmen && x.saat===saat);

        if(!dolu && !cakisma){

          yerlesim.push({
            gun,saat,
            ders:d.ders,
            ogretmen:d.ogretmen
          });

          kalan--;
        }
      }
    }
  }

  // FIREBASE'e kaydet
  for(let p of yerlesim){
    await addDoc(collection(db,"program"),p);
  }

  alert("Program oluşturuldu 🔥");
  veriGetir();
}

// VERİ ÇEK
async function veriGetir(){
  programData = [];

  const snap = await getDocs(collection(db,"program"));
  snap.forEach(d=>{
    programData.push(d.data());
  });

  ciz();
}

// ÇİZ
function ciz(){

  let html=`<div class="program">`;

  html+=`<div></div>`;
  saatler.forEach(s=> html+=`<div class="saat">${s}</div>`);

  gunler.forEach(gun=>{
    html+=`<div class="gun">${gun}</div>`;

    saatler.forEach(saat=>{

      let ders = programData.find(p=>p.gun===gun && p.saat===saat);

      if(ders){
        html+=`<div class="hucre">
        <div class="ders">${ders.ders}<br><small>${ders.ogretmen}</small></div>
        </div>`;
      }else{
        html+=`<div class="hucre"></div>`;
      }

    });
  });

  html+=`</div>`;
  document.getElementById("program").innerHTML = html;
}

veriGetir();

</script>

</body>
</html>
