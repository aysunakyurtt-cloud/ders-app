<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

h1 {
    text-align: center;
    color: #ffd700;
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
    font-size: 15px;
}

button {
    background: #ffd700;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.dayTitle {
    margin-top: 15px;
    color: #ffd700;
    font-weight: bold;
}

.card {
    background: #222;
    padding: 12px;
    border-radius: 12px;
    margin-top: 8px;
    border-left: 5px solid #ffd700;
}

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus">
<option>Bahçelievler</option>
<option>Başakşehir</option>
</select>

<select id="sinif">
<option>5A</option>
<option>6A</option>
</select>

<input type="date" id="tarih">

<button onclick="filtrele()">Tarihe Göre Filtrele</button>

<div id="liste"></div>

</div>

<script>

// 🔥 DERS VERİLERİ
const programlar = [

{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"09:00", ders:"Türkçe"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"10:00", ders:"Fen"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"11:00", ders:"Matematik"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"12:00", ders:"İngilizce"},

{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"09:00", ders:"Matematik"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"10:00", ders:"Türkçe"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"11:00", ders:"Fen"},

{kampus:"Bahçelievler", sinif:"5A", gun:"Çarşamba", saat:"09:00", ders:"Fen"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Çarşamba", saat:"10:00", ders:"Matematik"},

{kampus:"Bahçelievler", sinif:"5A", gun:"Perşembe", saat:"09:00", ders:"İngilizce"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Perşembe", saat:"10:00", ders:"Türkçe"},

{kampus:"Bahçelievler", sinif:"5A", gun:"Cuma", saat:"09:00", ders:"Sosyal"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Cuma", saat:"10:00", ders:"Matematik"},

{kampus:"Başakşehir", sinif:"6A", gun:"Pazartesi", saat:"09:00", ders:"Fizik"},
{kampus:"Başakşehir", sinif:"6A", gun:"Salı", saat:"10:00", ders:"Kimya"}

];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

// 📅 SAYFA AÇILINCA HAFTALIK GÖSTER
window.onload = haftalikGoster;

// 📅 HAFTALIK PROGRAM
function haftalikGoster(){

    let liste = document.getElementById("liste");
    liste.innerHTML = "";

    gunler.forEach(gun=>{

        let dersler = programlar.filter(p =>
            p.kampus===kampus.value &&
            p.sinif===sinif.value &&
            p.gun===gun
        );

        dersler.sort((a,b)=> a.saat.localeCompare(b.saat));

        if(dersler.length > 0){

            liste.innerHTML += `<div class="dayTitle">${gun}</div>`;

            dersler.forEach(d=>{
                liste.innerHTML += `
                <div class="card">
                    ${d.saat} - ${d.ders}
                </div>`;
            });
        }
    });
}

// 📅 TARİH → GÜN
function gunBul(tarih){
    const g = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    return g[new Date(tarih).getDay()];
}

// 🎯 TARİH FİLTRE
function filtrele(){

    let tarih = document.getElementById("tarih").value;
    if(!tarih) return;

    let gun = gunBul(tarih);

    let liste = document.getElementById("liste");

    let dersler = programlar.filter(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun
    );

    dersler.sort((a,b)=> a.saat.localeCompare(b.saat));

    liste.innerHTML = `<div class="dayTitle">${gun}</div>`;

    if(dersler.length === 0){
        liste.innerHTML += "Ders yok";
        return;
    }

    dersler.forEach(d=>{
        liste.innerHTML += `
        <div class="card">
            ${d.saat} - ${d.ders}
        </div>`;
    });
}

// 🔄 SEÇİM DEĞİŞİNCE YENİDEN YÜKLE
kampus.onchange = haftalikGoster;
sinif.onchange = haftalikGoster;

</script>

</body>
</html>
