<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Okul Sistemi PRO</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}
h1{text-align:center;color:#facc15;margin:20px}

.container{max-width:1000px;margin:auto;padding:20px}

input,button{
width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px
}

button{background:#facc15;font-weight:bold;cursor:pointer}

.hidden{display:none}

.card{
background:#0f172a;
padding:15px;
border-radius:10px;
margin-top:15px
}
</style>
</head>

<body>

<h1>🏫 Okul Sistemi</h1>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>🔐 Giriş / Kayıt</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="kayit()">Kayıt Ol</button>
<button onclick="giris()">Giriş Yap</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden card">
<h3>👑 Admin Panel</h3>
<button onclick="alert('Buraya yönetim eklenecek')">Yönetim</button>
</div>

<!-- ÖĞRETMEN -->
<div id="ogretmenPanel" class="hidden card">
<h3>👨‍🏫 Öğretmen Paneli</h3>
<button onclick="alert('Programın burada')">Programımı Gör</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// KAYIT
window.kayit = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Kayıt başarılı");
  }catch(e){
    alert(e.message);
  }
};

// GİRİŞ
window.giris = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Giriş başarılı");
  }catch(e){
    alert(e.message);
  }
};

// OTURUM TAKİP
onAuthStateChanged(auth,(user)=>{
  if(user){

    loginBox.style.display="none";

    // ADMIN kontrol (email ile)
    if(user.email==="admin@gmail.com"){
      adminPanel.classList.remove("hidden");
    }else{
      ogretmenPanel.classList.remove("hidden");
    }

  }
});

</script>

</body>
</html>
