<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #9face6);
  text-align: center;
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
}

h1 {
  margin-bottom: 20px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3498db;
  color: white;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th {
  background: #3498db;
  color: white;
  padding: 8px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.sil {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 5px;
}

.edit {
  background: orange;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ders Programı</h1>

  <select id="filterGun" onchange="filtrele()">
    <option value="Tümü">Tümü</option>
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
  </select>

  <select id="gun">
    <option>Pazartesi</option>
    <option>Salı</option>
    <option>Çarşamba</option>
    <option>Perşembe</option>
    <option>Cuma</option>
  </select>

  <input id="saat" placeholder="Saat">
  <input id="ders" placeholder="Ders">
  <input id="ogretmen" placeholder="Öğretmen">
  <input id="sinif" placeholder="Sınıf">
  <input id="kampus" placeholder="Kampüs">

  <button onclick="ekleGuncelle()" id="btn">Ekle</button>

  <table>
    <thead>
      <tr>
        <th>Gün</th>
        <th>Saat</th>
        <th>Ders</th>
        <th>Öğretmen</th>
        <th>Sınıf</th>
        <th>Kampüs</th>
        <th>İşlem</th>
      </tr>
    </thead>
    <tbody id="liste"></tbody>
  </table>
</div>

<script>
let dersler = JSON.parse(localStorage.getItem("dersler")) || [];
let editIndex = -1;

function kaydet() {
  localStorage.setItem("dersler", JSON.stringify(dersler));
}

function ekleGuncelle() {
  let veri = {
    gun: document.getElementById("gun").value,
    saat: document.getElementById("saat").value,
    ders: document.getElementById("ders").value,
    ogretmen: document.getElementById("ogretmen").value,
    sinif: document.getElementById("sinif").value,
    kampus: document.getElementById("kampus").value
  };

  if(editIndex === -1) {
    dersler.push(veri);
  } else {
    dersler[editIndex] = veri;
    editIndex = -1;
    document.getElementById("btn").innerText = "Ekle";
  }

  kaydet();
  temizle();
  listele();
}

function listele() {
  let secili = document.getElementById("filterGun").value;
  let html = "";

  dersler.forEach((d, i) => {
    if(secili === "Tümü" || d.gun === secili) {
      html += `
      <tr>
        <td>${d.gun}</td>
        <td>${d.saat}</td>
        <td>${d.ders}</td>
        <td>${d.ogretmen}</td>
        <td>${d.sinif}</td>
        <td>${d.kampus}</td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="sil" onclick="sil(${i})">Sil</button>
        </td>
      </tr>`;
    }
  });

  document.getElementById("liste").innerHTML = html;
}

function sil(i) {
  dersler.splice(i, 1);
  kaydet();
  listele();
}

function edit(i) {
  let d = dersler[i];

  document.getElementById("gun").value = d.gun;
  document.getElementById("saat").value = d.saat;
  document.getElementById("ders").value = d.ders;
  document.getElementById("ogretmen").value = d.ogretmen;
  document.getElementById("sinif").value = d.sinif;
  document.getElementById("kampus").value = d.kampus;

  editIndex = i;
  document.getElementById("btn").innerText = "Güncelle";
}

function filtrele() {
  listele();
}

function temizle() {
  document.getElementById("saat").value = "";
  document.getElementById("ders").value = "";
  document.getElementById("ogretmen").value = "";
  document.getElementById("sinif").value = "";
  document.getElementById("kampus").value = "";
}

listele();
</script>

</body>
</html>
