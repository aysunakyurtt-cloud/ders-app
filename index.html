<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* ÜST BAR */
.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  color: #facc15;
}

/* ANA KART */
.container {
  max-width: 700px;
  margin: 20px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: fadeIn 0.6s ease;
}

/* INPUTLAR */
select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.3s;
}

select:hover {
  background: rgba(255,255,255,0.2);
}

/* TABLO */
.tableWrap {
  overflow-x: auto;
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #facc15;
  color: black;
  padding: 12px;
  font-weight: bold;
}

td {
  padding: 12px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

td:hover {
  background: rgba(250,204,21,0.2);
}

tr:nth-child(even) td {
  background: rgba(255,255,255,0.03);
}

/* ANİMASYON */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* MOBİL */
@media(max-width:600px){
  .container {
    margin: 10px;
    padding: 15px;
  }

  th, td {
    font-size: 12px;
    padding: 8px;
  }
}

</style>
</head>

<body>

<div class="header">
📚 Ders Programı
</div>

<div class="container">

<select id="kampus"></select>
<select id="sinif"></select>

<div class="tableWrap">
<table id="tablo"></table>
</div>

</div>

<script>

let programlar = [];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00"];

// İlk harf büyüt
function buyut(text){
  return text.charAt(0).toUpperCase() + text.slice(1);
}

// JSON çek
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    programlar = data;
    kampusleriDoldur();
  });

// Kampüs doldur
function kampusleriDoldur(){
  const list = [...new Set(programlar.map(p=>p.kampus))];
  kampus.innerHTML = "<option>Kampüs Seç</option>";

  list.forEach(k=>{
    kampus.innerHTML += `<option value="${k}">${buyut(k)}</option>`;
  });
}

// Sınıf doldur
function siniflariDoldur(){
  const list = [...new Set(programlar
    .filter(p=>p.kampus===kampus.value)
    .map(p=>p.sinif))];

  sinif.innerHTML = "<option>Sınıf Seç</option>";

  list.forEach(s=>{
    sinif.innerHTML += `<option value="${s}">${s}. Sınıf</option>`;
  });
}

// TABLO
function tabloOlustur(){

  const tablo = document.getElementById("tablo");
  tablo.innerHTML = "";

  let html = "<tr><th>Saat</th>";

  gunler.forEach(g=>{
    html += `<th>${g}</th>`;
  });

  html += "</tr>";

  saatler.forEach(saat=>{
    html += `<tr><td>${saat}</td>`;

    gunler.forEach(gun=>{

      const ders = programlar.find(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun &&
        p.saat===saat
      );

      html += `<td>${ders ? ders.ders : "-"}</td>`;
    });

    html += "</tr>";
  });

  tablo.innerHTML = html;
}

// Events
kampus.onchange = ()=>{
  siniflariDoldur();
  tabloOlustur();
};

sinif.onchange = tabloOlustur;

</script>

</body>
</html>
