<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ders Programı</title>

<style>

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color:white;
}

/* KUTU */
.container {
  max-width:480px;
  margin:60px auto;
  padding:30px;
  border-radius:25px;
  background: rgba(30,41,59,0.9);
  backdrop-filter: blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1 {
  text-align:center;
  color:#facc15;
}

/* INPUT */
input, select {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#020617;
  color:white;
}

/* BUTON */
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.main {
  background:#facc15;
  color:black;
}

.sec {
  background:#020617;
  color:#facc15;
  border:1px solid #facc15;
}

.hidden {
  display:none;
}

.card {
  background:#020617;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border-left:4px solid #facc15;
}

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="Kullanıcı adı">
<input id="pass" type="password" placeholder="Şifre">
<button class="main" onclick="giris()">Giriş Yap</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Beykent</option>
</select>

<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input id="ders" placeholder="Ders">
<input id="ogretmen" placeholder="Öğretmen">

<button class="main" onclick="dersKaydet()">Dersi Kaydet</button>
<button class="sec" onclick="programSil()">Programı Temizle</button>

</div>

<hr>

<!-- HERKES GÖREBİLİR -->
<button class="sec" onclick="haftalik()">Haftalık Program</button>
<button class="sec" onclick="gunluk()">Seçilen Gün</button>

<div id="liste"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 LOGIN
window.giris = function(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").classList.remove("hidden");
    alert("Giriş başarılı");
  } else {
    alert("Hatalı giriş");
  }
}

// 📌 DERS EKLE
window.dersKaydet = async function(){

  const kampus = kampusEl.value;
  const sinif = sinifEl.value;
  const gun = gunEl.value;
  const saat = saatEl.value;
  const ders = dersEl.value;
  const ogretmen = ogretmenEl.value;

  const snap = await getDocs(collection(db,"dersler"));

  let cakisma=false;

  snap.forEach(doc=>{
    const d = doc.data();

    if(
      d.kampus===kampus &&
      d.sinif===sinif &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;

    if(
      d.ogretmen===ogretmen &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;
  });

  if(cakisma){
    alert("❌ Çakışma var!");
    return;
  }

  await addDoc(collection(db,"dersler"),{
    kampus,sinif,gun,saat,ders,ogretmen
  });

  alert("Kaydedildi");
}

// 📊 HAFTALIK
window.haftalik = async function(){

  const snap = await getDocs(collection(db,"dersler"));
  let html="";

  snap.forEach(doc=>{
    const d = doc.data();
    html+=`
    <div class="card">
    ${d.gun} ${d.saat}<br>
    📘 ${d.ders}<br>
    👨‍🏫 ${d.ogretmen}
    </div>`;
  });

  liste.innerHTML=html;
}

// 📅 GÜNLÜK
window.gunluk = async function(){

  const gun = document.getElementById("gun").value;
  const snap = await getDocs(collection(db,"dersler"));
  let html="";

  snap.forEach(doc=>{
    const d = doc.data();
    if(d.gun===gun){
      html+=`
      <div class="card">
      ${d.saat} → ${d.ders}<br>
      👨‍🏫 ${d.ogretmen}
      </div>`;
    }
  });

  liste.innerHTML=html;
}

// 🗑 TEMİZLE
window.programSil = async function(){

  const snap = await getDocs(collection(db,"dersler"));

  for(let d of snap.docs){
    await deleteDoc(doc(db,"dersler",d.id));
  }

  alert("Silindi");
}

</script>

</body>
</html>
