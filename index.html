<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Ders Programı</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: #020617;
  color:white;
}

.container {
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

h1 {
  text-align:center;
  color:#facc15;
}

input,button,select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td {
  border:1px solid #334155;
  padding:10px;
  text-align:center;
}

th {
  background:black;
  color:#facc15;
}

.card {
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Akıllı Ders Programı</h1>

<!-- ÖĞRETMEN EKLE -->
<div class="card">
<h3>👨‍🏫 Öğretmen Ekle</h3>
<input id="ogretmenAd" placeholder="Ad">
<input id="ogretmenBrans" placeholder="Branş">
<button onclick="ogretmenEkle()">Ekle</button>
</div>

<!-- DERS EKLE -->
<div class="card">
<h3>📚 Ders Planı</h3>
<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<input id="dersAdi" placeholder="Ders">
<input id="dersSaat" type="number" placeholder="Haftalık Saat">

<button onclick="dersEkle()">Ekle</button>
</div>

<!-- OLUŞTUR -->
<button onclick="programOlustur()">🚀 OTOMATİK PROGRAM OLUŞTUR</button>

<div id="tablo"></div>

</div>

<script>

let ogretmenler = [];
let dersler = [];

// öğretmen ekle
function ogretmenEkle(){
  ogretmenler.push({
    ad: ogretmenAd.value,
    brans: ogretmenBrans.value
  });
  alert("Öğretmen eklendi");
}

// ders ekle
function dersEkle(){
  dersler.push({
    sinif: sinif.value,
    ders: dersAdi.value,
    haftalikSaat: Number(dersSaat.value)
  });
  alert("Ders eklendi");
}

// PROGRAM OLUŞTUR
function programOlustur(){

  const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
  const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00"];

  let program = [];
  let dolu = {};

  function uygunMu(ogretmen, gun, saat){
    return !program.some(p =>
      p.ogretmen === ogretmen &&
      p.gun === gun &&
      p.saat === saat
    );
  }

  dersler.forEach(dersItem => {

    let kalan = dersItem.haftalikSaat;

    while(kalan > 0){

      let yerlesti = false;

      for(let gun of gunler){
        for(let saat of saatler){

          const key = dersItem.sinif + gun + saat;

          if(dolu[key]) continue;

          const ogretmen = ogretmenler.find(o =>
            o.brans.toLowerCase() === dersItem.ders.toLowerCase()
          );

          if(!ogretmen) continue;

          if(!uygunMu(ogretmen.ad, gun, saat)) continue;

          program.push({
            sinif: dersItem.sinif,
            ders: dersItem.ders,
            ogretmen: ogretmen.ad,
            gun,
            saat
          });

          dolu[key] = true;
          kalan--;
          yerlesti = true;
          break;
        }
        if(yerlesti) break;
      }

      if(!yerlesti){
        alert("Yer bulunamadı: " + dersItem.ders);
        break;
      }
    }

  });

  tabloyuCiz(program);
}

// TABLO
function tabloyuCiz(program){

  const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
  const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00"];

  let veri = {};

  program.forEach(p=>{
    if(!veri[p.saat]) veri[p.saat]={};
    veri[p.saat][p.gun] = p.ders + "<br><small>"+p.ogretmen+"</small>";
  });

  let html = "<table><tr><th>Saat</th>";
  gunler.forEach(g=> html+="<th>"+g+"</th>");
  html+="</tr>";

  saatler.forEach(s=>{
    html+="<tr><td>"+s+"</td>";

    gunler.forEach(g=>{
      html+="<td>"+(veri[s]?.[g] || "-")+"</td>";
    });

    html+="</tr>";
  });

  html+="</table>";

  document.getElementById("tablo").innerHTML = html;
}

</script>

</body>
</html>
