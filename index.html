<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
}

/* Kart */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: #111827;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  color: #facc15;
}

/* Select */
select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

/* Tablo */
.tableWrap {
  overflow-x: auto;
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #facc15;
  color: black;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  background: #1f2937;
}

tr:nth-child(even) td {
  background: #111827;
}

/* Mobil */
@media(max-width:600px){
  .container {
    margin: 10px;
    padding: 15px;
  }
}

</style>
</head>

<body>

<div class="container">

<h2>Ders Programı</h2>

<select id="kampus"></select>
<select id="sinif"></select>

<div class="tableWrap">
<table id="tablo"></table>
</div>

</div>

<script>

let programlar = [];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00"];

// İlk harfi büyütme
function buyut(text){
  return text.charAt(0).toUpperCase() + text.slice(1);
}

// JSON çek
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    programlar = data;
    kampusleriDoldur();
  });

// Kampüs doldur
function kampusleriDoldur(){
  const list = [...new Set(programlar.map(p=>p.kampus))];
  kampus.innerHTML = "<option>Kampüs Seç</option>";

  list.forEach(k=>{
    kampus.innerHTML += `<option value="${k}">${buyut(k)}</option>`;
  });
}

// Sınıf doldur
function siniflariDoldur(){
  const list = [...new Set(programlar
    .filter(p=>p.kampus===kampus.value)
    .map(p=>p.sinif))];

  sinif.innerHTML = "<option>Sınıf Seç</option>";

  list.forEach(s=>{
    sinif.innerHTML += `<option>${s}. Sınıf</option>`;
  });
}

// TABLO
function tabloOlustur(){

  const tablo = document.getElementById("tablo");
  tablo.innerHTML = "";

  let html = "<tr><th>Saat</th>";

  gunler.forEach(g=>{
    html += `<th>${g}</th>`;
  });

  html += "</tr>";

  saatler.forEach(saat=>{
    html += `<tr><td>${saat}</td>`;

    gunler.forEach(gun=>{

      const ders = programlar.find(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun &&
        p.saat===saat
      );

      html += `<td>${ders ? ders.ders : "-"}</td>`;
    });

    html += "</tr>";
  });

  tablo.innerHTML = html;
}

// Event
kampus.onchange = ()=>{
  siniflariDoldur();
  tabloOlustur();
};

sinif.onchange = tabloOlustur;

</script>

</body>
</html>
