<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ders Programı</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.container {
  max-width:500px;
  margin:40px auto;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
}

h1 {
  text-align:center;
  color:#facc15;
}

select,input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

select,input {
  background:#0f172a;
  color:white;
}

button {
  background:#facc15;
  font-weight:bold;
}

.card {
  background:#0f172a;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ders Programı</h1>

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Beykent</option>
</select>

<select id="sinif">
<option value="1">1. Sınıf</option>
<option value="2">2. Sınıf</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input type="text" id="ders" placeholder="Ders">
<input type="text" id="ogretmen" placeholder="Öğretmen">

<button onclick="dersKaydet()">Dersi Kaydet</button>
<button onclick="haftalikGetir()">Haftalık Program</button>
<button onclick="gunGetir()">Seçilen Gün</button>
<button onclick="otomatikProgram()">🤖 Otomatik Program</button>
<button onclick="programSil()">🗑 Programı Temizle</button>

<div id="liste"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 KAYDET (ÖĞRETMEN ÇAKIŞMA DAHİL)
window.dersKaydet = async function(){

  const kampus = kampusEl.value;
  const sinif = sinifEl.value;
  const gun = gunEl.value;
  const saat = saatEl.value;
  const ders = dersEl.value;
  const ogretmen = ogretmenEl.value;

  const snap = await getDocs(collection(db,"dersler"));

  let cakisma = false;

  snap.forEach(doc=>{
    const d = doc.data();

    // SINIF ÇAKIŞMA
    if(
      d.kampus===kampus &&
      d.sinif===sinif &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;

    // ÖĞRETMEN ÇAKIŞMA
    if(
      d.ogretmen===ogretmen &&
      d.gun===gun &&
      d.saat===saat
    ) cakisma=true;
  });

  if(cakisma){
    alert("❌ Çakışma var!");
    return;
  }

  await addDoc(collection(db,"dersler"),{
    kampus,sinif,gun,saat,ders,ogretmen
  });

  alert("Kaydedildi");
}

// 📌 HAFTALIK
window.haftalikGetir = async function(){

  const snap = await getDocs(collection(db,"dersler"));

  let html="";

  snap.forEach(doc=>{
    const d = doc.data();
    html+=`<div class="card">
    ${d.gun} ${d.saat} → ${d.ders}<br>
    👨‍🏫 ${d.ogretmen}
    </div>`;
  });

  liste.innerHTML=html;
}

// 📌 GÜN
window.gunGetir = async function(){

  const gun = gunEl.value;
  const snap = await getDocs(collection(db,"dersler"));

  let html="";

  snap.forEach(doc=>{
    const d = doc.data();

    if(d.gun===gun){
      html+=`<div class="card">
      ${d.saat} → ${d.ders}<br>
      👨‍🏫 ${d.ogretmen}
      </div>`;
    }
  });

  liste.innerHTML=html;
}

// 🤖 OTOMATİK
window.otomatikProgram = async function(){
  alert("Bu kısım geliştirmede 😎");
}

// 🗑 SİL
window.programSil = async function(){

  const snap = await getDocs(collection(db,"dersler"));

  for(let d of snap.docs){
    await deleteDoc(doc(db,"dersler",d.id));
  }

  alert("Silindi");
}

</script>

</body>
</html>
