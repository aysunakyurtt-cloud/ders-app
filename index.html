<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #333;
  --primary: #3498db;
}

.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #fff;
  --primary: #f1c40f;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

.container {
  max-width: 95%;
  margin: 20px auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.toggle {
  background: var(--primary);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
}

.selectBox {
  margin: 15px 0;
}

select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  border: 1px solid #ddd;
  text-align: center;
  padding: 10px;
  font-size: 12px;
}

th {
  background: var(--primary);
  color: white;
}

td {
  height: 60px;
}

.ders {
  font-weight: bold;
  font-size: 13px;
}

/* SCROLL MOBILE */
.tableWrap {
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2><i class="fa-solid fa-calendar"></i> Ders Programı</h2>
  <button class="toggle" onclick="temaDegistir()">🌙</button>
</div>

<div class="selectBox">
<select id="kampus"></select>
<select id="sinif"></select>
</div>

<div class="tableWrap">
<table id="tablo">
</table>
</div>

</div>

<script>

let programlar = [
  {kampus:"Bahçelievler", sinif:"9A", gun:"Pazartesi", saat:"09:00", ders:"Matematik"},
  {kampus:"Bahçelievler", sinif:"9A", gun:"Salı", saat:"10:00", ders:"Türkçe"},
  {kampus:"Bahçelievler", sinif:"9A", gun:"Çarşamba", saat:"11:00", ders:"Fizik"}
];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const saatler = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00"];

// Kampüs
function kampusleriDoldur(){
  const list = [...new Set(programlar.map(p=>p.kampus))];
  kampus.innerHTML = "<option>Kampüs Seç</option>";

  list.forEach(k=>{
    kampus.innerHTML += `<option>${k}</option>`;
  });
}

// Sınıf
function siniflariDoldur(){
  const list = [...new Set(programlar
    .filter(p=>p.kampus===kampus.value)
    .map(p=>p.sinif))];

  sinif.innerHTML = "<option>Sınıf Seç</option>";

  list.forEach(s=>{
    sinif.innerHTML += `<option>${s}</option>`;
  });
}

// TABLO OLUŞTUR
function tabloOlustur(){

  const tablo = document.getElementById("tablo");
  tablo.innerHTML = "";

  let html = "<tr><th>Saat</th>";

  gunler.forEach(g=>{
    html += `<th>${g}</th>`;
  });

  html += "</tr>";

  saatler.forEach(saat=>{
    html += `<tr><td>${saat}</td>`;

    gunler.forEach(gun=>{

      const ders = programlar.find(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun &&
        p.saat===saat
      );

      html += `<td>${ders ? `<div class="ders">${ders.ders}</div>` : ""}</td>`;
    });

    html += "</tr>";
  });

  tablo.innerHTML = html;
}

// Tema
function temaDegistir(){
  document.body.classList.toggle("dark");
}

// Events
kampus.onchange = ()=>{
  siniflariDoldur();
  tabloOlustur();
};

sinif.onchange = tabloOlustur;

// Başlat
kampusleriDoldur();

</script>

</body>
</html>
