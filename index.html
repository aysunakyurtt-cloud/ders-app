<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 500px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
}

h1 {
    text-align: center;
    color: #ffd700;
}

select {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    background: #222;
    color: white;
}

.card {
    background: #222;
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus" onchange="programGetir()">
<option value="">Kampüs Seç</option>
<option>Haliç</option>
<option>Bahçelievler</option>
<option>Florya</option>
</select>

<div id="liste"></div>

</div>

<script>

// 🔥 HAZIR PROGRAMLAR
const programlar = {
    "Haliç": [
        {gun:"Pazartesi", saat:"09:00", ders:"Matematik", ogretmen:"Ahmet", sinif:"5"},
        {gun:"Salı", saat:"10:00", ders:"Türkçe", ogretmen:"Ayşe", sinif:"5"}
    ],
    "Bahçelievler": [
        {gun:"Pazartesi", saat:"11:00", ders:"Fizik", ogretmen:"Mehmet", sinif:"6"}
    ],
    "Florya": [
        {gun:"Çarşamba", saat:"13:00", ders:"Kimya", ogretmen:"Zeynep", sinif:"7"}
    ]
};

// 🎯 KAMPÜS SEÇİNCE ÇALIŞIR
function programGetir() {
    let kampus = document.getElementById("kampus").value;
    let liste = document.getElementById("liste");

    liste.innerHTML = "";

    if (!programlar[kampus]) {
        liste.innerHTML = "Program bulunamadı";
        return;
    }

    programlar[kampus].forEach(d => {
        liste.innerHTML += `
        <div class="card">
            <b>${d.gun}</b><br>
            Saat: ${d.saat}<br>
            Ders: ${d.ders}<br>
            Öğretmen: ${d.ogretmen}<br>
            Sınıf: ${d.sinif}
        </div>`;
    });
}

</script>

</body>
</html>
