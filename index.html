<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<!-- ICON -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #333;
  --primary: #3498db;
}

.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #fff;
  --primary: #f1c40f;
}

body {
  font-family: Arial;
  background: var(--bg);
  margin: 0;
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 420px;
  margin: 30px auto;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.toggle {
  background: var(--primary);
  border: none;
  padding: 10px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.toggle:hover {
  transform: scale(1.1);
}

/* SELECT BOX */
.selectBox {
  background: var(--card);
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeIn 0.5s ease;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #eee;
}

/* CARD */
.kart {
  background: var(--card);
  padding: 15px;
  margin-top: 12px;
  border-radius: 15px;
  border-left: 5px solid var(--primary);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  animation: slideUp 0.4s ease;
  transition: 0.3s;
}

.kart:hover {
  transform: translateY(-5px) scale(1.02);
}

.kart i {
  margin-right: 8px;
  color: var(--primary);
}

.bos {
  text-align: center;
  margin-top: 20px;
  opacity: 0.6;
}

/* ANIMATIONS */
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2><i class="fa-solid fa-calendar-days"></i> Ders Programı</h2>
  <button class="toggle" onclick="temaDegistir()">🌙</button>
</div>

<div class="selectBox">
<select id="kampus"></select>
<select id="sinif"></select>
</div>

<div id="program">
  <div class="bos">Seçim yap 👆</div>
</div>

</div>

<script>

// DEMO DATA
let programlar = [
  {kampus:"Bahçelievler", sinif:"9A", gun:"Pazartesi", saat:"09:00", ders:"Matematik"},
  {kampus:"Bahçelievler", sinif:"9A", gun:"Pazartesi", saat:"10:00", ders:"Türkçe"},
  {kampus:"Başakşehir", sinif:"10A", gun:"Salı", saat:"11:00", ders:"Fizik"}
];

// Kampüs doldur
function kampusleriDoldur(){
  const kList = [...new Set(programlar.map(p=>p.kampus))];
  kampus.innerHTML = "<option>Kampüs Seç</option>";

  kList.forEach(k=>{
    kampus.innerHTML += `<option>${k}</option>`;
  });
}

// Sınıf doldur
function siniflariDoldur(){
  const sList = [...new Set(programlar
    .filter(p=>p.kampus===kampus.value)
    .map(p=>p.sinif))];

  sinif.innerHTML = "<option>Sınıf Seç</option>";

  sList.forEach(s=>{
    sinif.innerHTML += `<option>${s}</option>`;
  });
}

// Göster
function goster(){
  const liste = document.getElementById("program");
  liste.innerHTML = "";

  const filtre = programlar.filter(p =>
    p.kampus===kampus.value && p.sinif===sinif.value
  );

  if(filtre.length === 0){
    liste.innerHTML = "<div class='bos'>Program bulunamadı</div>";
    return;
  }

  filtre.forEach(p=>{
    liste.innerHTML += `
      <div class="kart">
        <div><i class="fa-solid fa-clock"></i>${p.gun} - ${p.saat}</div>
        <div><i class="fa-solid fa-book"></i><b>${p.ders}</b></div>
      </div>
    `;
  });
}

// Tema
function temaDegistir(){
  document.body.classList.toggle("dark");
}

// Events
kampus.onchange = ()=>{
  siniflariDoldur();
  goster();
};

sinif.onchange = goster;

kampusleriDoldur();

</script>

</body>
</html>
