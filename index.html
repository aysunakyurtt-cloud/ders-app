<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş</title>

  <style>
    body {
      background: #0b1c2c;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #112b44;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login {
      background: gold;
    }

    .register {
      background: gray;
      color: white;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Giriş</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Şifre">

  <button id="loginBtn" class="login">Giriş Yap</button>
  <button id="registerBtn" class="register">Kayıt Ol</button>
</div>

<script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// 🔥 SENİN CONFIG (DOĞRU)
const firebaseConfig = {
  apiKey: "AIzaSyAg_jsDkigb3FfQNg4nvU3SVI3fPlzNh0c",
  authDomain: "ders-app-yeni.firebaseapp.com",
  projectId: "ders-app-yeni",
  storageBucket: "ders-app-yeni.firebasestorage.app",
  messagingSenderId: "727261766408",
  appId: "1:727261766408:web:e2ac1df436f63d607482bd",
  measurementId: "G-3T8VT9G4CB"
};

// 🔥 başlat
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 elementler
const email = document.getElementById("email");
const password = document.getElementById("password");

// 🔥 kayıt ol
document.getElementById("registerBtn").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("✅ Kayıt başarılı!");
  } catch (e) {
    alert("❌ " + e.message);
  }
};

// 🔥 giriş yap
document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("🎉 Giriş başarılı!");
    window.location.href = "main.html";
  } catch (e) {
    alert("❌ " + e.message);
  }
};

</script>

</body>
</html>
