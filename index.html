<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #9face6);
  margin: 0;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.kart {
  background: #f2f2f2;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.bos {
  text-align: center;
  margin-top: 20px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">
<h2>Ders Programı</h2>

<select id="kampus">
  <option value="">Kampüs Seç</option>
</select>

<select id="sinif">
  <option value="">Sınıf Seç</option>
</select>

<div id="program">
  <div class="bos">Henüz veri yüklenmedi</div>
</div>

</div>

<script>

// 🔥 BOŞ VERİ (SONRA DOLDURACAĞIZ)
let programlar = [];

// Kampüsleri doldur
function kampusleriDoldur(){
  const kampusler = [...new Set(programlar.map(p => p.kampus))];
  kampus.innerHTML = "<option value=''>Kampüs Seç</option>";

  kampusler.forEach(k=>{
    kampus.innerHTML += `<option>${k}</option>`;
  });
}

// Sınıfları doldur
function siniflariDoldur(){
  const k = kampus.value;

  const siniflar = [...new Set(programlar
    .filter(p => p.kampus === k)
    .map(p => p.sinif))];

  sinif.innerHTML = "<option value=''>Sınıf Seç</option>";

  siniflar.forEach(s=>{
    sinif.innerHTML += `<option>${s}</option>`;
  });
}

// Program göster
function goster(){
  const k = kampus.value;
  const s = sinif.value;

  const liste = document.getElementById("program");
  liste.innerHTML = "";

  const filtre = programlar.filter(p =>
    p.kampus === k && p.sinif === s
  );

  if(filtre.length === 0){
    liste.innerHTML = "<div class='bos'>Program bulunamadı</div>";
    return;
  }

  filtre.forEach(p=>{
    liste.innerHTML += `
      <div class="kart">
        ${p.gun} - ${p.saat}<br>
        <b>${p.ders}</b>
      </div>
    `;
  });
}

// EVENTLER
kampus.onchange = () => {
  siniflariDoldur();
  goster();
};

sinif.onchange = goster;

</script>

</body>
</html>
