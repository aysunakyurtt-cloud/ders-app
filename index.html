<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
}

.container {
    max-width: 600px;
    margin: 20px auto;
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255,215,0,0.2);
}

h1 {
    text-align: center;
    color: #ffd700;
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
    font-size: 15px;
}

button {
    background: #ffd700;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.dayTitle {
    margin-top: 20px;
    color: #ffd700;
    font-weight: bold;
    font-size: 18px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
    background: #222;
}

.saat {
    font-weight: bold;
    font-size: 16px;
}

.ders {
    font-size: 15px;
}

.ogretmen {
    font-size: 13px;
    color: #aaa;
}

/* 🎨 Ders renkleri */
.matematik { border-left: 5px solid #3498db; }
.turkce { border-left: 5px solid #e74c3c; }
.fen { border-left: 5px solid #2ecc71; }
.ingilizce { border-left: 5px solid #9b59b6; }
.sosyal { border-left: 5px solid #f39c12; }

</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus">
<option>Bahçelievler</option>
<option>Başakşehir</option>
</select>

<select id="sinif">
<option>5A</option>
<option>6A</option>
</select>

<input type="date" id="tarih">

<button onclick="filtrele()">Tarihe Göre Filtrele</button>

<div id="liste"></div>

</div>

<script>

// 🎯 DERSLER (ARTIK ÖĞRETMEN VAR)
const programlar = [

{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"09:00", ders:"Matematik", ogretmen:"Ahmet"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"10:00", ders:"Türkçe", ogretmen:"Ayşe"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Pazartesi", saat:"11:00", ders:"Fen", ogretmen:"Mehmet"},

{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"09:00", ders:"İngilizce", ogretmen:"Zeynep"},
{kampus:"Bahçelievler", sinif:"5A", gun:"Salı", saat:"10:00", ders:"Sosyal", ogretmen:"Ali"},

{kampus:"Başakşehir", sinif:"6A", gun:"Pazartesi", saat:"09:00", ders:"Matematik", ogretmen:"Hoca1"}

];

const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

// 🎨 RENK CLASS BELİRLE
function dersClass(ders){
    ders = ders.toLowerCase();

    if(ders.includes("matematik")) return "matematik";
    if(ders.includes("türkçe")) return "turkce";
    if(ders.includes("fen")) return "fen";
    if(ders.includes("ingilizce")) return "ingilizce";
    if(ders.includes("sosyal")) return "sosyal";

    return "";
}

// 📅 HAFTALIK
window.onload = haftalikGoster;

function haftalikGoster(){

    liste.innerHTML = "";

    gunler.forEach(gun=>{

        let dersler = programlar.filter(p =>
            p.kampus===kampus.value &&
            p.sinif===sinif.value &&
            p.gun===gun
        );

        dersler.sort((a,b)=> a.saat.localeCompare(b.saat));

        if(dersler.length > 0){

            liste.innerHTML += `<div class="dayTitle">${gun}</div>`;

            dersler.forEach(d=>{
                liste.innerHTML += `
                <div class="card ${dersClass(d.ders)}">
                    <div>
                        <div class="saat">${d.saat}</div>
                        <div class="ders">${d.ders}</div>
                        <div class="ogretmen">${d.ogretmen}</div>
                    </div>
                </div>`;
            });
        }
    });
}

// 📅 TARİH → GÜN
function gunBul(tarih){
    const g = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    return g[new Date(tarih).getDay()];
}

// 🎯 FİLTRE
function filtrele(){

    let tarih = document.getElementById("tarih").value;
    if(!tarih) return;

    let gun = gunBul(tarih);

    let dersler = programlar.filter(p =>
        p.kampus===kampus.value &&
        p.sinif===sinif.value &&
        p.gun===gun
    );

    dersler.sort((a,b)=> a.saat.localeCompare(b.saat));

    liste.innerHTML = `<div class="dayTitle">${gun}</div>`;

    if(dersler.length === 0){
        liste.innerHTML += "Ders yok";
        return;
    }

    dersler.forEach(d=>{
        liste.innerHTML += `
        <div class="card ${dersClass(d.ders)}">
            <div>
                <div class="saat">${d.saat}</div>
                <div class="ders">${d.ders}</div>
                <div class="ogretmen">${d.ogretmen}</div>
            </div>
        </div>`;
    });
}

// 🔄 DEĞİŞİM
kampus.onchange = haftalikGoster;
sinif.onchange = haftalikGoster;

</script>

</body>
</html>
