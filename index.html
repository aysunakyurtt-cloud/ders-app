<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haftalık Ders Programı</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

input, select {
    width: 90%;
    padding: 12px;
    margin: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(to right, #2196F3, #00BCD4);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #2196F3;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

td button {
    width: auto;
    padding: 5px 10px;
    margin: 2px;
}

.edit-btn { background: orange; }
.delete-btn { background: red; }
</style>
</head>

<body>

<div class="container">
    <h1>Haftalık Ders Programı</h1>

    <select id="gun">
        <option>Pazartesi</option>
        <option>Salı</option>
        <option>Çarşamba</option>
        <option>Perşembe</option>
        <option>Cuma</option>
    </select>

    <input type="text" id="saat" placeholder="Saat">
    <input type="text" id="ders" placeholder="Ders adı">
    <input type="text" id="ogretmen" placeholder="Öğretmen">
    <input type="text" id="sinif" placeholder="Sınıf">
    <input type="text" id="kampus" placeholder="Kampüs">

    <button onclick="ekle()">Ekle / Güncelle</button>

    <table id="tablo">
        <tr>
            <th>Gün</th>
            <th>Saat</th>
            <th>Ders</th>
            <th>Öğretmen</th>
            <th>Sınıf</th>
            <th>Kampüs</th>
            <th>İşlem</th>
        </tr>
    </table>
</div>

<script>
let program = JSON.parse(localStorage.getItem("program")) || [];
let editIndex = -1;

window.onload = function () {
    program.forEach(veri => satirEkle(veri));
};

function ekle() {
    var veri = {
        gun: document.getElementById("gun").value,
        saat: document.getElementById("saat").value,
        ders: document.getElementById("ders").value,
        ogretmen: document.getElementById("ogretmen").value,
        sinif: document.getElementById("sinif").value,
        kampus: document.getElementById("kampus").value
    };

    if(veri.saat === "" || veri.ders === "") {
        alert("Saat ve ders zorunlu!");
        return;
    }

    if(editIndex === -1) {
        program.push(veri);
    } else {
        program[editIndex] = veri;
        editIndex = -1;
        document.querySelector("button").innerText = "Ekle";
    }

    localStorage.setItem("program", JSON.stringify(program));
    tabloYenile();
    temizle();
}

function satirEkle(veri, index) {
    var tablo = document.getElementById("tablo");
    var satir = tablo.insertRow();

    satir.insertCell(0).innerText = veri.gun;
    satir.insertCell(1).innerText = veri.saat;
    satir.insertCell(2).innerText = veri.ders;
    satir.insertCell(3).innerText = veri.ogretmen;
    satir.insertCell(4).innerText = veri.sinif;
    satir.insertCell(5).innerText = veri.kampus;

    var btnCell = satir.insertCell(6);

    // EDIT
    var editBtn = document.createElement("button");
    editBtn.innerText = "Edit";
    editBtn.className = "edit-btn";
    editBtn.onclick = function () {
        document.getElementById("gun").value = veri.gun;
        document.getElementById("saat").value = veri.saat;
        document.getElementById("ders").value = veri.ders;
        document.getElementById("ogretmen").value = veri.ogretmen;
        document.getElementById("sinif").value = veri.sinif;
        document.getElementById("kampus").value = veri.kampus;

        editIndex = index;
        document.querySelector("button").innerText = "Güncelle";
    };

    // DELETE
    var silBtn = document.createElement("button");
    silBtn.innerText = "Sil";
    silBtn.className = "delete-btn";
    silBtn.onclick = function () {
        program.splice(index, 1);
        localStorage.setItem("program", JSON.stringify(program));
        tabloYenile();
    };

    btnCell.appendChild(editBtn);
    btnCell.appendChild(silBtn);
}

function tabloYenile() {
    var tablo = document.getElementById("tablo");
    tablo.innerHTML = `
        <tr>
            <th>Gün</th>
            <th>Saat</th>
            <th>Ders</th>
            <th>Öğretmen</th>
            <th>Sınıf</th>
            <th>Kampüs</th>
            <th>İşlem</th>
        </tr>
    `;

    program.forEach((veri, index) => satirEkle(veri, index));
}

function temizle() {
    document.getElementById("saat").value = "";
    document.getElementById("ders").value = "";
    document.getElementById("ogretmen").value = "";
    document.getElementById("sinif").value = "";
    document.getElementById("kampus").value = "";
}
</script>

</body>
</html>
