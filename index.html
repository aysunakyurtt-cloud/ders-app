<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: 'Segoe UI';
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

.container {
  max-width: 800px;
  margin: 30px auto;
  background: rgba(30,41,59,0.9);
  padding: 25px;
  border-radius: 20px;
}

h1 {
  text-align: center;
  color: #FFD700;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #FFD700;
  font-weight: bold;
  cursor: pointer;
}

.kart {
  background: #0f172a;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border-left: 5px solid #FFD700;
}
</style>
</head>

<body>

<div class="container">

<h1>Ders Programı</h1>

<select id="kampus">
<option>Haliç</option>
<option>Bahçeşehir</option>
<option>Başakşehir</option>
<option>Pendik</option>
<option>Florya</option>
</select>

<select id="sinif">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<select id="gun">
<option>Pazartesi</option>
<option>Salı</option>
<option>Çarşamba</option>
<option>Perşembe</option>
<option>Cuma</option>
</select>

<input type="time" id="saat">
<input type="text" id="ders" placeholder="Ders">

<button onclick="ekle()">Dersi Kaydet</button>

<button onclick="getir()">Haftalık Program</button>
<button onclick="gunGetir()">Seçilen Gün</button>

<div id="liste"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCUrqU0_PrzConRKjlYNoZ7yU38ZPwxfk",
  authDomain: "ders-programi-d79e0.firebaseapp.com",
  projectId: "ders-programi-d79e0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// EKLE
window.ekle = async function() {

  const kampus = kampus.value;
  const sinif = sinif.value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;
  const ders = document.getElementById("ders").value;
  const ogretmen = prompt("Öğretmen:");

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let cakisma = false;

  querySnapshot.forEach(doc => {
    const d = doc.data();

    if (
      d.kampus === kampus &&
      d.sinif === sinif &&
      d.gun === gun &&
      d.saat === saat
    ) cakisma = true;
  });

  if (cakisma) {
    alert("❌ Çakışma var!");
    return;
  }

  await addDoc(collection(db, "dersler"), {
    kampus, sinif, gun, saat, ders, ogretmen
  });

  alert("Kaydedildi");
}

// HAFTALIK TABLO
window.getir = async function() {

  const kampusSec = kampus.value;
  const sinifSec = sinif.value;

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let saatler = [];
  let program = {};

  querySnapshot.forEach(doc => {
    const d = doc.data();

    if (d.kampus !== kampusSec || d.sinif !== sinifSec) return;

    if (!program[d.saat]) program[d.saat] = {};
    program[d.saat][d.gun] = d.ders;

    if (!saatler.includes(d.saat)) saatler.push(d.saat);
  });

  saatler.sort();

  const gunler = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];

  let html = "<table border='1' style='width:100%;text-align:center'>";

  html += "<tr><th>Saat</th>";
  gunler.forEach(g => html += `<th>${g}</th>`);
  html += "</tr>";

  saatler.forEach(saat => {
    html += "<tr>";
    html += `<td>${saat}</td>`;

    gunler.forEach(g => {
      html += `<td>${program[saat][g] || "-"}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  liste.innerHTML = html;
}

// 🔥 GÜN FİLTRE
window.gunGetir = async function() {

  const kampusSec = kampus.value;
  const sinifSec = sinif.value;
  const gunSec = document.getElementById("gun").value;

  const querySnapshot = await getDocs(collection(db, "dersler"));

  let dersler = [];

  querySnapshot.forEach(doc => {
    const d = doc.data();

    if (
      d.kampus === kampusSec &&
      d.sinif === sinifSec &&
      d.gun === gunSec
    ) {
      dersler.push(d);
    }
  });

  dersler.sort((a,b) => a.saat.localeCompare(b.saat));

  let html = `<h3>${gunSec}</h3>`;

  dersler.forEach(d => {
    html += `
    <div class="kart">
      <b>${d.saat}</b> - ${d.ders} <br>
      <small>${d.ogretmen}</small>
    </div>
    `;
  });

  liste.innerHTML = html;
}

</script>

</body>
</html>
