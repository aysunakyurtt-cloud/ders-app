<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Programı</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #9face6);
  margin: 0;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.kart {
  background: #f2f2f2;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Ders Programı</h2>

<select id="kampus" onchange="goster()">
<option value="">Kampüs Seç</option>
<option>Bahçelievler</option>
<option>Başakşehir</option>
<option>Florya</option>
</select>

<select id="sinif" onchange="goster()">
<option value="">Sınıf Seç</option>
<option>9A</option>
<option>9B</option>
<option>10A</option>
</select>

<div id="program"></div>
</div>

<script>

// 🔥 ÖRNEK VERİTABANI
const programlar = [
  {
    kampus: "Bahçelievler",
    sinif: "9A",
    gun: "Pazartesi",
    saat: "09:00",
    ders: "Matematik"
  },
  {
    kampus: "Bahçelievler",
    sinif: "9A",
    gun: "Pazartesi",
    saat: "10:00",
    ders: "Türkçe"
  },
  {
    kampus: "Başakşehir",
    sinif: "10A",
    gun: "Salı",
    saat: "11:00",
    ders: "Fizik"
  }
];

// GÖSTER
function goster(){
  const k = kampus.value;
  const s = sinif.value;

  const liste = document.getElementById("program");
  liste.innerHTML = "";

  const filtre = programlar.filter(p => 
    p.kampus === k && p.sinif === s
  );

  if(filtre.length === 0){
    liste.innerHTML = "<p>Program bulunamadı</p>";
    return;
  }

  filtre.forEach(p=>{
    liste.innerHTML += `
      <div class="kart">
        ${p.gun} - ${p.saat}<br>
        <b>${p.ders}</b>
      </div>
    `;
  });
}

</script>

</body>
</html>
