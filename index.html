<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haftalık Ders Programı</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

h1 {
    margin-bottom: 20px;
}

input, select {
    width: 90%;
    padding: 12px;
    margin: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(to right, #2196F3, #00BCD4);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #2196F3;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

td button {
    background: red;
    width: auto;
    padding: 5px 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Haftalık Ders Programı</h1>

    <select id="gun">
        <option>Pazartesi</option>
        <option>Salı</option>
        <option>Çarşamba</option>
        <option>Perşembe</option>
        <option>Cuma</option>
    </select>

    <input type="text" id="saat" placeholder="Saat (örn: 10)">
    <input type="text" id="ders" placeholder="Ders adı">
    <input type="text" id="ogretmen" placeholder="Öğretmen">
    <input type="text" id="sinif" placeholder="Sınıf">
    <input type="text" id="kampus" placeholder="Kampüs">

    <button onclick="ekle()">Ekle</button>

    <table id="tablo">
        <tr>
            <th>Gün</th>
            <th>Saat</th>
            <th>Ders</th>
            <th>Öğretmen</th>
            <th>Sınıf</th>
            <th>Kampüs</th>
            <th>Sil</th>
        </tr>
    </table>
</div>

<script>
function ekle() {
    var gun = document.getElementById("gun").value;
    var saat = document.getElementById("saat").value;
    var ders = document.getElementById("ders").value;
    var ogretmen = document.getElementById("ogretmen").value;
    var sinif = document.getElementById("sinif").value;
    var kampus = document.getElementById("kampus").value;

    if(saat === "" || ders === "") {
        alert("Lütfen saat ve ders gir!");
        return;
    }

    var tablo = document.getElementById("tablo");
    var satir = tablo.insertRow();

    satir.insertCell(0).innerText = gun;
    satir.insertCell(1).innerText = saat;
    satir.insertCell(2).innerText = ders;
    satir.insertCell(3).innerText = ogretmen;
    satir.insertCell(4).innerText = sinif;
    satir.insertCell(5).innerText = kampus;

    var silBtn = document.createElement("button");
    silBtn.innerText = "Sil";

    silBtn.onclick = function () {
        satir.remove();
    };

    satir.insertCell(6).appendChild(silBtn);

    // input temizleme
    document.getElementById("saat").value = "";
    document.getElementById("ders").value = "";
    document.getElementById("ogretmen").value = "";
    document.getElementById("sinif").value = "";
    document.getElementById("kampus").value = "";
}
</script>

</body>
</html>
