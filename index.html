<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PRO Ders Programı</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
h1{text-align:center;color:#facc15}

.container{max-width:1200px;margin:auto;padding:20px}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}

.box{
background:#0f172a;
padding:15px;
border-radius:10px;
}

input,select,button{
width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px
}

button{background:#facc15;font-weight:bold;cursor:pointer}

.program{
display:grid;
grid-template-columns:80px repeat(5,1fr);
gap:5px;margin-top:20px
}

.hucre{background:#0f172a;padding:10px;min-height:60px;border-radius:6px}

.ders{
background:#22c55e;
color:black;
padding:5px;
border-radius:6px;
margin-bottom:5px;
font-size:12px
}

.baslik{color:#facc15;text-align:center}
</style>

</head>
<body>

<h1>🏫 PRO Ders Programı Sistemi</h1>

<div class="container">

<div class="grid">

<!-- ÖĞRETMEN -->
<div class="box">
<h3>👨‍🏫 Öğretmen</h3>
<input id="t_ad" placeholder="Ad">
<input id="t_brans" placeholder="Branş">
<button onclick="ogretmenEkle()">Ekle</button>
</div>

<!-- DERS -->
<div class="box">
<h3>📚 Ders (Sınıf)</h3>
<input id="sinif" placeholder="Sınıf (1-A)">
<input id="d_ad" placeholder="Ders">
<input id="d_saat" type="number" placeholder="Saat">
<button onclick="dersEkle()">Ekle</button>
</div>

<!-- OTOMATİK -->
<div class="box">
<h3>🤖 Sistem</h3>
<button onclick="olustur()">Program Oluştur</button>
<button onclick="temizle()">Temizle</button>
</div>

</div>

<div id="program"></div>

</div>

<script>

let ogretmenler=[];
let dersler=[];
let program=[];

const gunler=["Pzt","Sal","Çar","Per","Cum"];
const saatler=["09","10","11","12","13","14"];

// ÖĞRETMEN EKLE
function ogretmenEkle(){
  ogretmenler.push({
    ad:t_ad.value,
    brans:t_brans.value
  });
  alert("Eklendi");
}

// DERS EKLE
function dersEkle(){
  dersler.push({
    sinif:sinif.value,
    ders:d_ad.value,
    saat:Number(d_saat.value)
  });
  alert("Eklendi");
}

// OTOMATİK OLUŞTUR
function olustur(){

  program=[];

  for(let d of dersler){

    let ogretmen = ogretmenler.find(o=>o.brans===d.ders);
    if(!ogretmen) continue;

    let kalan = d.saat;

    for(let g of gunler){
      for(let s of saatler){

        if(kalan<=0) break;

        // SLOT DOLU MU
        let dolu = program.find(p=>p.gun===g && p.saat===s && p.sinif===d.sinif);

        // ÖĞRETMEN ÇAKIŞMA
        let cakisma = program.find(p=>p.gun===g && p.saat===s && p.ogretmen===ogretmen.ad);

        if(!dolu && !cakisma){

          program.push({
            sinif:d.sinif,
            gun:g,
            saat:s,
            ders:d.ders,
            ogretmen:ogretmen.ad
          });

          kalan--;
        }
      }
    }
  }

  ciz();
}

// TEMİZLE
function temizle(){
  program=[];
  ciz();
}

// ÇİZ
function ciz(){

  let html=`<div class="program">`;

  html+=`<div></div>`;
  gunler.forEach(g=> html+=`<div class="baslik">${g}</div>`);

  saatler.forEach(s=>{

    html+=`<div class="baslik">${s}:00</div>`;

    gunler.forEach(g=>{

      let derslerim = program.filter(p=>p.gun===g && p.saat===s);

      html+=`<div class="hucre">`;

      derslerim.forEach(d=>{
        html+=`<div class="ders">
        ${d.sinif}<br>
        ${d.ders}<br>
        ${d.ogretmen}
        </div>`;
      });

      html+=`</div>`;
    });
  });

  html+=`</div>`;

  document.getElementById("program").innerHTML=html;
}

</script>

</body>
</html>
