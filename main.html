<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Derslerim</title>

<style>
body {
  background: #0b1c2c;
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 50px;
}

input {
  padding: 10px;
  width: 200px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add {
  background: gold;
}

.logout {
  background: red;
  color: white;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #112b44;
  margin: 10px auto;
  padding: 10px;
  width: 300px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>🎉 Hoşgeldin</h2>
<p id="userEmail"></p>

<input id="lessonInput" placeholder="Ders adı gir">
<button id="addBtn" class="add">Ekle</button>

<ul id="lessonList"></ul>

<button id="logoutBtn" class="logout">Çıkış Yap</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 SENİN YENİ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAg_jsDkigb3FfQNg4nvU3SVI3fPlzNh0c",
  authDomain: "ders-app-yeni.firebaseapp.com",
  projectId: "ders-app-yeni",
  storageBucket: "ders-app-yeni.firebasestorage.app",
  messagingSenderId: "727261766408",
  appId: "1:727261766408:web:e2ac1df436f63d607482bd"
};

// 🔥 Başlat
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const list = document.getElementById("lessonList");
const input = document.getElementById("lessonInput");

let currentUser = null;

// 🔐 Kullanıcı kontrol
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  document.getElementById("userEmail").innerText = user.email;

  loadLessons();
});

// 📥 Dersleri yükle (SADECE KENDİ DERSLERİ)
async function loadLessons() {
  list.innerHTML = "";

  const q = query(
    collection(db, "lessons"),
    where("userId", "==", currentUser.uid)
  );

  const querySnapshot = await getDocs(q);

  querySnapshot.forEach((docItem) => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${docItem.data().name}
      <button onclick="deleteLesson('${docItem.id}')">❌</button>
    `;

    list.appendChild(li);
  });
}

// ➕ Ders ekle
document.getElementById("addBtn").onclick = async () => {
  if (input.value.trim() === "") return;

  await addDoc(collection(db, "lessons"), {
    name: input.value,
    userId: currentUser.uid
  });

  input.value = "";
  loadLessons();
};

// ❌ Ders sil
window.deleteLesson = async (id) => {
  await deleteDoc(doc(db, "lessons", id));
  loadLessons();
};

// 🚪 Çıkış
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};

</script>

</body>
</html>
