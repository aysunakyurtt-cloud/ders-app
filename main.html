<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ana Sayfa</title>

  <style>
    body {
      background: #0b1c2c;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎉 Hoşgeldin</h1>
<p id="userEmail"></p>

<button id="logoutBtn">Çıkış Yap</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_jsDkigb3FfQNg4nvU3SVI3fPlzNh0c",
  authDomain: "ders-app-yeni.firebaseapp.com",
  projectId: "ders-app-yeni",
  storageBucket: "ders-app-yeni.firebasestorage.app",
  messagingSenderId: "727261766408",
  appId: "1:727261766408:web:e2ac1df436f63d607482bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// kullanıcı kontrol
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location.href = "index.html";
  }
});

// çıkış
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
