<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dersler</title>

<style>
body {
  background: #0b1c2c;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  margin-top: 30px;
}

.card {
  background: #112b44;
  margin: 10px auto;
  padding: 15px;
  width: 300px;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  background: gold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>📚 Ders Programım</h1>

  <!-- EKLEME ALANI -->
  <div>
    <input id="ad" placeholder="Ders adı">
    <input id="gun" placeholder="Gün">
    <input id="saat" placeholder="Saat">
    <br>
    <button onclick="addLesson()">Ders Ekle</button>
  </div>

  <hr>

  <!-- LİSTE -->
  <div id="list"></div>

  <button onclick="logout()">Çıkış Yap</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 config
const firebaseConfig = {
  apiKey: "AIzaSyAg_jsDkigb3FfQNg4nvU3SVI3fPlzNh0c",
  authDomain: "ders-app-yeni.firebaseapp.com",
  projectId: "ders-app-yeni",
  storageBucket: "ders-app-yeni.firebasestorage.app",
  messagingSenderId: "727261766408",
  appId: "1:727261766408:web:e2ac1df436f63d607482bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 giriş kontrol
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadLessons();
  }
});

// 📥 listele
async function loadLessons() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "dersler"));

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${d.ad}</h3>
        <p>📅 ${d.gun}</p>
        <p>⏰ ${d.saat}</p>
      </div>
    `;
  });
}

// ➕ EKLEME
window.addLesson = async () => {
  const ad = document.getElementById("ad").value;
  const gun = document.getElementById("gun").value;
  const saat = document.getElementById("saat").value;

  if (!ad || !gun || !saat) {
    alert("Hepsini doldur!");
    return;
  }

  await addDoc(collection(db, "dersler"), {
    ad,
    gun,
    saat
  });

  alert("✅ Ders eklendi!");

  // temizle
  document.getElementById("ad").value = "";
  document.getElementById("gun").value = "";
  document.getElementById("saat").value = "";

  loadLessons();
};

// 🚪 çıkış
window.logout = () => {
  signOut(auth);
};

</script>

</body>
</html>
